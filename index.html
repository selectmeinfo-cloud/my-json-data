/* ── News Card ── */
.ncard{background:#fff;border-radius:12px;margin-bottom:14px;overflow:hidden;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:box-shadow .2s,transform .15s;position:relative}

/* Image */
.nc-img-wrap{position:relative;overflow:hidden;width:100%;height:200px}
.nc-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;background:#e8e8e8;transition:transform .35s ease}
.ncard:hover .nc-img-wrap img{transform:scale(1.03)}
.nc-cat-badge{position:absolute;top:10px;left:10px;background:#e53935;color:#fff;font-size:10px;font-weight:800;padding:3px 9px;border-radius:3px;text-transform:uppercase;letter-spacing:.06em}
.nc-share-fab{position:absolute;top:10px;right:10px;width:30px;height:30px;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:none;cursor:pointer;color:#fff;transition:background .15s;opacity:0}
.ncard:hover .nc-share-fab,.ncard:focus-within .nc-share-fab{opacity:1}

.nc-body{padding:13px 14px 10px}

/* ── Compact card (text-only, alternate) ── */
.ncard-compact{display:grid;grid-template-columns:1fr 100px;gap:0;background:#fff;border-radius:12px;margin-bottom:14px;overflow:hidden;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:box-shadow .2s}
.ncard-compact:hover{box-shadow:0 4px 18px rgba(0,0,0,.14)}
body.dark .ncard-compact{background:#1e2130}
.ncc-body{padding:12px 14px}
.ncc-cat{font-size:9px;font-weight:800;color:#e53935;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.ncc-title{font-size:14px;font-weight:700;color:#111;line-height:1.3;margin-bottom:4px}
body.dark .ncc-title{color:#eee}
.ncc-meta{font-size:10px;color:#999}
.ncc-img{height:100%;min-height:90px;object-fit:cover;width:100%;display:block;background:#e8e8e8}

/* ── Ad Card ── */
@keyframes adSlideIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes adShimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes adPulse{0%,100%{box-shadow:0 4px 18px rgba(67,160,71,.2),0 0 0 0 rgba(67,160,71,0)}50%{box-shadow:0 8px 28px rgba(27,94,32,.35),0 0 0 3px rgba(165,214,167,.25)}}

@keyframes adBgFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
/* Multi-text fade animation */
@keyframes adTextIn{0%{opacity:0;transform:translateY(7px)}12%{opacity:1;transform:translateY(0)}75%{opacity:1;transform:translateY(0)}90%{opacity:0;transform:translateY(-7px)}100%{opacity:0;transform:translateY(-7px)}}
@keyframes adTextGlow{0%,100%{text-shadow:none}50%{text-shadow:0 0 12px rgba(200,0,30,.35)}}

/* ── Ad Card — gradient background + animated text ── */
.ad-card{
  background:linear-gradient(135deg,#e8f5e9 0%,#a5d6a7 100%);
  
  animation:adSlideIn .45s cubic-bezier(.22,1,.36,1) both,adPulse 3s ease-in-out 1.2s infinite;
  border-radius:14px;margin-bottom:14px;overflow:hidden;
  border:1.5px solid #66bb6a;cursor:pointer;position:relative;transition:box-shadow .2s
}
body.dark .ad-card{
  background:linear-gradient(135deg,#0a2e0d 0%,#1b5e20 100%);
  
  border-color:#2e7d32
}
.ad-card::before{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.22) 50%,transparent 60%);background-size:400px 100%;animation:adShimmer 2.8s linear infinite;pointer-events:none;z-index:1}
body.dark .ad-card::before{background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.06) 50%,transparent 60%);background-size:400px 100%}

/* Coloured left accent bar */
.ad-card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#1b5e20,#43a047,#a5d6a7);z-index:3;border-radius:0}

.ad-card-inner{display:grid;grid-template-columns:1fr 110px;gap:0;min-height:100px}
.ad-card-body{padding:12px 14px 12px 17px;display:flex;flex-direction:column;justify-content:flex-start;gap:0;position:relative;z-index:2}
.ad-badge{font-size:8px;font-weight:800;color:#1b5e20;background:linear-gradient(90deg,#c8e6c9,#a5d6a7);padding:2px 8px;border-radius:3px;letter-spacing:.09em;text-transform:uppercase;display:inline-block;width:fit-content;margin-bottom:6px;border:1px solid rgba(27,94,32,.2)}
body.dark .ad-badge{background:linear-gradient(90deg,#0a2e0d,#133d18);color:#a5d6a7;border-color:rgba(165,214,167,.2)}

/* Multi-text animation container */
.ad-text-anim{position:relative;overflow:hidden;margin-bottom:2px}
.ad-text-slide{position:absolute;top:0;left:0;right:0;opacity:0;transform:translateY(10px);transition:opacity .45s ease,transform .45s ease;pointer-events:none}
.ad-text-slide.active{opacity:1;transform:translateY(0);pointer-events:auto;position:relative}
.ad-text-slide.exit{opacity:0;transform:translateY(-10px)}
/* Static (single line) title */
.ad-card-title{font-size:13px;font-weight:700;color:var(--ad-text,#111);line-height:1.35;margin-bottom:4px;white-space:pre-wrap;word-break:break-word}
body.dark .ad-card-title{color:#ffe8a0}
.ad-card-sub{font-size:10.5px;color:var(--ad-sub,#1b5e20);line-height:1.4;white-space:pre-wrap;word-break:break-word;margin-top:2px}
body.dark .ad-card-sub{color:#a5d6a7}
.ad-card-img{object-fit:cover;width:100%;height:100%;min-height:100px;display:block;background:#f5ece0;position:relative;z-index:2}
.ad-card-noimg{display:flex;align-items:center;justify-content:center;font-size:30px;background:linear-gradient(135deg,#c8e6c9,#a5d6a7);height:100%;min-height:100px;position:relative;z-index:2}
body.dark .ad-card-noimg{background:linear-gradient(135deg,#0a2e0d,#1b5e20)}



/* ── Bottom nav (4-tab: Home, Categories, Today, Settings) — always on mobile ── */
#feedBottomNav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;z-index:950;padding:0 0 env(safe-area-inset-bottom,0px);box-shadow:0 -2px 12px rgba(0,0,0,.1)}
@media(max-width:900px){
  #feedBottomNav{display:block !important}
  /* Inner pages — bottom nav height కోసం space */
  .page,.article-page,.cat-page,.static-page{padding-bottom:72px !important}
  /* Footer ని bottom nav దాచకుండా push చేయి */
  .footer{margin-bottom:56px}
}
body.dark #feedBottomNav{background:#1a1d27;border-top-color:#252836}
.fbn-in{display:flex;justify-content:space-around;align-items:stretch;height:56px}
.fbn-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:44px;padding:4px 2px;cursor:pointer;border:none;background:none;font-family:inherit;font-size:9px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.03em;transition:color .15s;min-width:0;position:relative}

.dm-toggle::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .18s;box-shadow:0 1px 3px rgba(0,0,0,.2)}

/* ═══════════ GLOBAL DARK MODE — అన్ని pages కూ ═══════════ */
body.dark{background:#0f1117;color:#e0e0e0}
body.dark,:root{--dm-ease:.2s}

/* CSS variable overrides for dark mode */
body.dark{
  --ink:#e0e0e0;
  --ink2:#c8c8c8;
  --ink3:#aaaaaa;
  --ink4:#777777;
  --ink5:#444444;
  --bg:#0f1117;
  --bg2:#161922;
  --bg3:#1e2130;
  --bdr:#252836;
  --bdr2:#333648;
}

/* Masthead */
body.dark .masthead{background:#161922;border-bottom-color:#252836;box-shadow:0 1px 0 0 var(--red)}
body.dark .srch-box{border-color:#333648}
body.dark .srch-box input{background:#1e2130;color:#e0e0e0}
body.dark .srch-box input::placeholder{color:#555}
body.dark .srch-box button{background:#252836;color:#ccc}
body.dark .srch-box button:hover{background:var(--red);color:#fff}

/* Shared header */
body.dark #sharedHeader{background:#161922;border-bottom-color:#252836}

/* Ticker / top4 scrolling band */
body.dark .top4-wrapper{background:var(--bg);border-bottom-color:var(--bdr)}
body.dark .top4-wrapper::before{background:linear-gradient(to right,var(--bg) 30%,transparent)}
body.dark .top4-wrapper::after{background:linear-gradient(to left,var(--bg) 30%,transparent)}
body.dark .top4-track .t4-card{border-right-color:var(--bdr)}
body.dark .top4-track .t4-card:hover{background:var(--bg2)}

/* Section headings */
body.dark .sec-hd{border-bottom-color:#e0e0e0}
body.dark .sec-hd .lbl{background:#e0e0e0;color:#0f1117}

/* Pub grid */
body.dark .pub-left{border-right-color:var(--bdr)}
body.dark .pub-right-top{border-bottom-color:var(--bdr)}
body.dark .pri-item{border-bottom-color:var(--bdr)}

/* Featured */
body.dark .feat-left{border-right-color:var(--bdr)}
body.dark .fr-item{border-bottom-color:var(--bdr)}

/* Popular grid */
body.dark .pop-item{border-right-color:var(--bdr);border-bottom-color:var(--bdr)}
body.dark .pop-item:hover{background:var(--bg2)}

/* Tri / more sections */
body.dark .tri-col{border-right-color:var(--bdr)}
body.dark .tri-col-hd{background:var(--bg2);border-bottom-color:var(--bdr)}
body.dark .tri-top{border-bottom-color:var(--bdr)}
body.dark .tri-item{border-bottom-color:var(--bdr)}
body.dark .tri-readmore{border-top-color:var(--bdr)}
body.dark .tri-readmore:hover{background:var(--bg2)}
body.dark .more-sec{border-color:var(--bdr)}
body.dark .more-col{border-right-color:var(--bdr)}
body.dark .mc-hd{background:var(--bg2);border-bottom-color:var(--bdr)}
body.dark .mc-item{border-bottom-color:var(--bdr)}
body.dark .mc-item:hover{background:var(--bg2)}
body.dark .mc-readmore{background:var(--bg2);border-top-color:var(--bdr)}
body.dark .mc-readmore:hover{background:var(--bg3)}

/* Sidebar */
body.dark .sb-box{border-color:var(--bdr)}
body.dark .sb-hd{background:#252836}
body.dark .sbt-item{border-bottom-color:var(--bdr)}
body.dark .sbt-item:hover{background:var(--bg2)}
body.dark .rasi-widget{border-color:var(--bdr);background:var(--bg2)}
body.dark .rasi-cell{background:var(--bg3);border-color:var(--bdr)}
body.dark .rasi-dots{background:var(--bg3);border-top-color:var(--bdr)}
body.dark .tag{background:var(--bg3);border-color:var(--bdr2);color:var(--ink3)}
body.dark .tag:hover{background:var(--ink);color:var(--bg)}

/* Article page */
body.dark .article-page{background:var(--bg)}
body.dark .article-headline{color:var(--ink)}
body.dark .article-dek{color:var(--ink3);background:var(--bg2)}
body.dark .article-meta-bar{border-top-color:var(--bdr);border-bottom-color:var(--bdr);color:var(--ink4)}
body.dark .article-author{color:var(--ink)}
body.dark .share-btn{background:var(--bg2);border-color:var(--bdr2);color:var(--ink3)}
body.dark .share-btn:hover{background:var(--ink);color:var(--bg);border-color:var(--ink)}
body.dark .article-body{color:#c8c8c8}
body.dark .article-body strong{color:var(--ink)}
body.dark .article-body blockquote{background:var(--bg2);color:var(--ink2)}
body.dark .article-body table th{background:#252836;color:#fff}
body.dark .article-body table td{border-color:var(--bdr);color:var(--ink2)}
body.dark .article-body table tr:nth-child(even) td{background:var(--bg2)}
body.dark .article-img-cap{color:var(--ink4)}
body.dark .article-tags{background:var(--bg2);border-top-color:var(--bdr);border-bottom-color:var(--bdr)}
body.dark .article-tag{background:var(--bg3);border-color:var(--bdr2);color:var(--ink3)}
body.dark .article-tag:hover{background:var(--red);color:#fff;border-color:var(--red)}
body.dark .related-articles{border-top-color:#252836}
body.dark .rel-card-title{color:var(--ink)}

/* Category page */
body.dark .cat-page{background:var(--bg)}
body.dark .cat-header{border-bottom-color:#252836}
body.dark .cat-header-name{color:var(--ink)}
body.dark .cat-subfilter{border-bottom-color:var(--bdr)}
body.dark .cat-sub-btn{color:var(--ink4)}
body.dark .cat-sub-btn:hover{color:var(--ink)}
body.dark .cat-featured{border-color:var(--bdr)}
body.dark .cat-feat-left{border-right-color:var(--bdr)}
body.dark .cat-feat-title{color:var(--ink)}
body.dark .cat-feat-dek{color:var(--ink3)}
body.dark .cat-feat-meta{color:var(--ink4)}
body.dark .cat-feat-item{border-bottom-color:var(--bdr)}
body.dark .cfi-title{color:var(--ink)}
body.dark .cat-grid{border-color:var(--bdr)}
body.dark .cat-grid-item{border-right-color:var(--bdr);border-bottom-color:var(--bdr)}
body.dark .cat-grid-item:hover{background:var(--bg2)}
body.dark .cgi-title{color:var(--ink)}
body.dark .lang-tabs{border-bottom-color:var(--bdr)}
body.dark .lang-tab{color:var(--ink4)}
body.dark .lang-tab:hover{color:var(--ink)}

/* Static pages (About, Contact) */
body.dark .static-page{background:var(--bg)}
body.dark .static-body{color:#c0c0c0}
body.dark .static-body h2{color:var(--ink);border-bottom-color:var(--bdr)}
body.dark .form-group label{color:var(--ink)}
body.dark .form-group input,body.dark .form-group textarea{background:var(--bg2);border-color:var(--bdr2);color:var(--ink)}
body.dark .form-group input:focus,body.dark .form-group textarea:focus{border-color:#aaa}
body.dark .form-submit{background:#252836;color:#eee}
body.dark .form-submit:hover{background:var(--red);color:#fff}
body.dark .stat-box{border-right-color:var(--bdr)}
body.dark .stat-row{border-color:var(--bdr)}
body.dark .stat-label{color:var(--ink4)}

/* Logo SVG — dark mode lo white avvali */
body.dark .masthead svg path[fill="#111"],
body.dark #sharedHeader svg path[fill="#111"]{fill:#e0e0e0}
body.dark .logo-sub{color:var(--ink4)}

/* Footer stays dark always — no change needed */

/* Back to top button */
body.dark #backToTop{background:#252836}
body.dark #backToTop:hover{background:var(--red)}

/* Breadcrumb */
body.dark .article-breadcrumb{color:var(--ink4)}

/* Images placeholder */
body.dark img{background:var(--bg3)}

/* Load error screen */
body.dark #pageHome h2{color:var(--ink)}
/* ═══════════ END GLOBAL DARK MODE ═══════════ */

/* ── No sidebar when feed active ── */
body.feed-mode #siteFooter{display:none}

/* ── Responsive ── */
@media(max-width:600px){
  .nc-img-wrap{height:180px}
  .nc-title{font-size:18px}
  .nc-summary{font-size:13.5px}
  #feedScroll{padding:10px 10px 80px}
  .ncard{border-radius:10px;margin-bottom:10px}
}
/* ═══════════ END INSHORTS+W2N CSS ═══════════ */
.shuffle-badge{display:inline-flex;align-items:center;gap:5px;font-size:8.5px;font-weight:700;color:var(--ink4);letter-spacing:.06em;padding:0 0 5px 0;margin-left:auto;margin-right:8px}
.shuffle-dot{width:5px;height:5px;background:#4ade80;border-radius:50%;animation:blink 2s ease infinite;flex-shrink:0}
.shuffle-countdown{color:var(--red);font-variant-numeric:tabular-nums}
.cat-empty{padding:60px 20px;text-align:center;font-family:'Outfit',sans-serif}
.cat-empty-icon{font-size:48px;margin-bottom:16px}
.cat-empty-msg{font-size:14px;color:var(--ink4)}
@media(max-width:900px){
  .main-layout,.article-layout,.cat-layout{grid-template-columns:1fr;gap:16px}
  .sidebar{display:flex;flex-direction:column;gap:14px}

  .pub-grid,.feat-grid,.cat-featured{grid-template-columns:1fr}
  .pub-left,.feat-left,.cat-feat-left{border-right:none;border-bottom:1px solid var(--bdr);padding-right:0;padding-bottom:14px;margin-bottom:14px}
  .pub-right,.feat-right{padding-left:0}
  .pop-grid{grid-template-columns:1fr 1fr}
  .video-grid-4{grid-template-columns:1fr 1fr}
  .tri-grid,.more-sec{grid-template-columns:1fr !important}
  .tri-col,.more-col{border-right:none;border-bottom:1px solid var(--bdr)}
  .related-grid{grid-template-columns:1fr 1fr}
  .form-row{grid-template-columns:1fr}
  .stat-row{grid-template-columns:1fr 1fr}
  .article-headline{font-size:26px}
  .article-hero-img{height:240px}
  .pub-big-title{font-size:20px}
  .pub-big-img{height:160px}
  .prt-img{height:110px}
  .cat-header-name{font-size:28px}
}
@media(max-width:600px){
  :root{--masthead-h:56px}
  .mh-left,.mh-right{display:none}
  .mh-in{justify-content:center;padding:0 16px}
  .mh-center{flex:1;text-align:center}
  .masthead{padding:8px 0}
  .mh-center svg{height:36px !important;width:auto !important}
  .page,.article-page,.cat-page,.static-page{padding:0 12px}
  .pop-grid{grid-template-columns:1fr 1fr}
  .pop-img{height:90px}
  .pop-title{font-size:12px;-webkit-line-clamp:2}
  .video-grid-4{grid-template-columns:1fr 1fr}
  .vg-img{height:80px}
  .vg-title{font-size:10px}
  .tri-grid,.more-sec{grid-template-columns:1fr !important}
  .tri-col,.more-col{border-right:none;border-bottom:1px solid var(--bdr)}
  .article-headline{font-size:22px;line-height:1.2}
  .article-dek{font-size:14px}
  .article-hero-img{height:200px}
  .article-body{font-size:14px}
  .article-body p{margin-bottom:16px}
  .article-meta-bar{flex-wrap:wrap;gap:6px;font-size:9.5px}
  .article-share{margin-left:0;width:100%;justify-content:flex-start}
  .related-grid{grid-template-columns:1fr}
  .rel-card-img{height:130px}
  .cat-header-name{font-size:24px}
  .cat-feat-img{height:180px}
  .cat-feat-title{font-size:18px}
  .cat-grid{grid-template-columns:1fr 1fr}
  .cgi-img{height:90px}
  .cgi-title{font-size:12px}
  .static-hero{padding:28px 20px}
  .static-hero-title{font-size:30px}
  .stat-row{grid-template-columns:1fr 1fr}
  .stat-num{font-size:32px}
  .ft-top{flex-direction:column;gap:14px}
  .ft-bottom{flex-direction:column;align-items:flex-start;gap:6px}
  #backToTop{bottom:14px;right:14px;width:34px;height:34px;font-size:14px}
  .rasi-slider{height:180px}
  .rasi-slide{height:180px}
  .mh-center{flex:1;display:flex;justify-content:center}
  .mh-center > div{display:none !important}
  .share-btn{padding:4px 8px;font-size:9px}
  .tag,.article-tag{font-size:9px;padding:3px 8px}

  .ad-incontent{height:200px;flex-direction:column;gap:10px}
}
@media(max-width:900px){
  #backToTop{bottom:70px !important}

  /* Article page — full width, no sidebar, no header */
  .article-page .sidebar{display:none !important}
  .article-page .article-layout{grid-template-columns:1fr !important;gap:0 !important}
  /* Hide shared header on mobile article/category/static pages */
  body:not(.feed-mode) #sharedHeader{display:none !important}
}
@media(max-width:380px){
  .pop-grid,.cat-grid{grid-template-columns:1fr}
  .video-grid-4{grid-template-columns:1fr}
  .article-headline{font-size:20px}
  .pub-big-title{font-size:16px}
}
</style>

const SHEET_ID='11YH8j5qp2FRqDmpa6vEN0g53U3CFkPIrLNqjRRu0Rjk';
const SHEET_GID='568663683';
let NAV_STRUCTURE=[];

async function loadNavFromSheet(){
  const csvUrl=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${SHEET_GID}`;
  try{const res=await fetch(csvUrl);if(!res.ok)throw new Error('Sheet fetch failed: '+res.status);const text=await res.text();parseSheetNav(text);return true;}
  catch(e){console.warn('[Nav] Sheet load failed:',e.message);buildNavFromArticles();return false;}
}
function parseSheetNav(csvText){
  const lines=csvText.trim().split('\n');if(!lines.length)return;
  const cols=[];
  // Icon map for known category keys
  const ICON_MAP={news:'📰',sports:'⚽',business:'💼',world:'🌍',astrology:'♒',
    features:'✍',video:'▶',crime:'⚖️',india:'🇮🇳',politics:'🏛️',cinema:'🎬',
    devotional:'🙏',jobs:'💼',health:'💊',education:'📚',technology:'💻',
    entertainment:'🎭',international:'🌍',regional:'🗺️',science:'🔬',
    environment:'🌿',finance:'💰',lifestyle:'🌟'};
  lines.forEach((line,rowIdx)=>{
    const cells=parseCSVLine(line);
    cells.forEach((cell,colIdx)=>{
      const val=cell.trim();if(!val)return;
      if(!cols[colIdx])cols[colIdx]={label:'',subs:[]};
      if(rowIdx===0){
        cols[colIdx].label=val;
        cols[colIdx].key=val.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
      } else {
        const subKey=val.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_\u0c00-\u0c7f]/g,'')||val;
        cols[colIdx].subs.push({label:val,key:subKey});
        // Sync sub-category into CATEGORIES
        if(!CATEGORIES[subKey]){
          CATEGORIES[subKey]={icon:ICON_MAP[subKey]||'📂',label:val,color:'#444',articles:[]};
        } else if(!CATEGORIES[subKey].label||CATEGORIES[subKey].label===subKey){
          CATEGORIES[subKey].label=val;
        }
      }
    });
  });
  NAV_STRUCTURE=cols.filter(c=>c.label);
  // Sync every top-level nav category into CATEGORIES
  NAV_STRUCTURE.forEach(function(n){
    if(!CATEGORIES[n.key]){
      CATEGORIES[n.key]={icon:ICON_MAP[n.key]||'📂',label:n.label,color:'#444',articles:[]};
    } else {
      // Update label from Sheet (Sheet is source of truth)
      CATEGORIES[n.key].label=n.label;
      if(!CATEGORIES[n.key].icon||CATEGORIES[n.key].icon==='📂')
        CATEGORIES[n.key].icon=ICON_MAP[n.key]||'📂';
    }
  });
}
function parseCSVLine(line){
  const result=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(ch===','&&!inQ){result.push(cur);cur='';}else{cur+=ch;}}
  result.push(cur);return result;
}
function buildNavFromArticles(){
  const seen=new Set();NAV_STRUCTURE=[];
  Object.values(ARTICLES).forEach(a=>{if(!seen.has(a.cat)){seen.add(a.cat);const label=(CATEGORIES[a.cat]&&CATEGORIES[a.cat].label)?CATEGORIES[a.cat].label:(a.catLabel||a.cat);NAV_STRUCTURE.push({key:a.cat,label,subs:[]});}});
}

function normalizeArticle(raw){
  if(!raw||!raw.id)return null;
  const bc=raw.blog_content||{};
  let bodyTe='',bodyEn='';
  if(typeof bc==='string'){bodyTe=bc;}
  else if(typeof bc==='object'){bodyTe=bc.telugu||'';bodyEn=bc.english||'';}
  function toHtml(text){if(!text)return '';if(/<[a-z][\s\S]*>/i.test(text))return text;return text.split(/\n\s*\n/).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).filter(p=>p!=='<p></p>').join('');}
  bodyTe=toHtml(bodyTe);bodyEn=toHtml(bodyEn);
  const body=bodyTe||bodyEn;
  const seo=raw.seo||{};
  const rawCat=(raw.category||'news').toString().trim().toLowerCase().replace(/\s+/g,'_');
  return{
    id:raw.id,cat:rawCat,catLabel:raw.category_label||raw.category||'News',
    title:raw.telugu_title||raw.english_title||raw.title||'Untitled',
    titleEn:raw.english_title||raw.title||raw.telugu_title||'',
    dek:raw.telugu_excerpt||raw.excerpt||'',
    author:raw.author||'Selectme Editorial',date:raw.published_date||raw.date||(raw.source&&raw.source.date?raw.source.date:'')||'',
    _ts:(function(){var d=raw.published_date||raw.date||(raw.source&&raw.source.date?raw.source.date:'')||'';if(!d)return 0;var dmyM=d.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);if(dmyM){var dy=parseInt(dmyM[1],10),mn=parseInt(dmyM[2],10),yr=parseInt(dmyM[3],10);var iso=yr+'-'+(mn<10?'0':'')+mn+'-'+(dy<10?'0':'')+dy;var t2=Date.parse(iso);if(!isNaN(t2))return t2;}var t=Date.parse(d);return isNaN(t)?0:t;})(),
    readTime:raw.read_time||'5 min read',
    img:(function(){
      var RAW_BASE='https://raw.githubusercontent.com/selectmeinfo-cloud/my-json-data/main/';
      var p=raw.media&&raw.media.featured_image?raw.media.featured_image:'';
      if(!p)return 'https://picsum.photos/seed/'+raw.id+'/900/500';
      if(p.startsWith('http'))return p;
      return RAW_BASE+p;
    })(),
    tags:Array.isArray(raw.tags)?raw.tags:(typeof raw.tags==='string'&&raw.tags.trim()?raw.tags.split(',').map(t=>t.trim()).filter(Boolean):[]),
    imgAlt:(function(){
      if(raw.media&&raw.media.featured_image_alt&&raw.media.featured_image_alt.trim())return raw.media.featured_image_alt.trim();
      var ytTags=raw.youtube_metadata&&Array.isArray(raw.youtube_metadata.tags)&&raw.youtube_metadata.tags.length?raw.youtube_metadata.tags.join(', '):'';
      if(ytTags)return ytTags;
      return raw.telugu_title||raw.english_title||raw.title||'';
    })(),
    imgCap:(raw.media&&raw.media.featured_image_caption&&raw.media.featured_image_caption.trim())?raw.media.featured_image_caption.trim():'',
    body,bodyTe,bodyEn,
    seoTitle:seo.title||seo.meta_title||(raw.youtube_metadata&&raw.youtube_metadata.title?raw.youtube_metadata.title:'')||raw.telugu_title||raw.english_title||'',
    seoDescription:seo.description||seo.meta_description||raw.telugu_excerpt||raw.excerpt||'',
    seoKeywords:(function(){
      var k1=Array.isArray(seo.keywords)?seo.keywords:(typeof seo.keywords==='string'&&seo.keywords.trim()?seo.keywords.split(',').map(function(s){return s.trim();}).filter(Boolean):[]);
      var k2=raw.youtube_metadata&&Array.isArray(raw.youtube_metadata.tags)?raw.youtube_metadata.tags:[];
      var merged=[...new Set([...k1,...k2])];
      return merged.join(', ');
    })(),
    related:raw.related_articles||[]
  };
}

const LOADED_CATS=new Set();

async function loadAllArticles(){
  const RAW='https://raw.githubusercontent.com/selectmeinfo-cloud/my-json-data/main/data/';
  const GITHUB_API='https://api.github.com/repos/selectmeinfo-cloud/my-json-data/contents/data';
  let fileList=[];

  // ── Step 1: manifest.json try (single file with all articles bundled) ──
  try{
    const mRes=await fetch(RAW+'manifest.json',{cache:'no-store'});
    if(mRes.ok){
      const mData=await mRes.json();
      // manifest.json లో articles array ఉంటే directly use చేయి — zero extra fetches!
      const arts=Array.isArray(mData)?mData:(mData.articles||mData.data||null);
      if(arts&&arts.length){
        let loaded=0;
        arts.forEach(raw=>{
          const art=normalizeArticle(raw);if(!art)return;
          ARTICLES[art.id]=art;
          const catKey=art.cat;
          if(!CATEGORIES[catKey])CATEGORIES[catKey]={icon:'📂',label:art.catLabel||catKey,articles:[]};
          if(!CATEGORIES[catKey].articles.includes(art.id))CATEGORIES[catKey].articles.push(art.id);
          LOADED_CATS.add(catKey);loaded++;
        });
        if(loaded>0){
          _sortCategories();
          console.log('[selectme] manifest.json: loaded',loaded,'articles (1 fetch!)');
          return true;
        }
      }
    }
  }catch(e){console.warn('[selectme] manifest.json failed:',e.message);}

  // ── Step 2: index.json → file list ──
  try{
    const idxRes=await fetch(RAW+'index.json',{cache:'no-store'});
    if(idxRes.ok){
      const idx=await idxRes.json();
      if(Array.isArray(idx)&&idx.length){
        fileList=idx.filter(f=>typeof f==='string'?f.endsWith('.json'):f.name&&f.name.endsWith('.json'))
                    .map(f=>typeof f==='string'?f:f.name)
                    .filter(f=>f!=='index.json'&&f!=='manifest.json');
      }else if(idx&&typeof idx==='object'&&idx.files){
        fileList=idx.files.filter(f=>f.endsWith('.json')&&f!=='index.json'&&f!=='manifest.json');
      }
    }
  }catch(e){console.warn('[selectme] index.json failed:',e.message);}

  // ── Step 3: GitHub API fallback ──
  if(!fileList.length){
    try{
      const res=await fetch(GITHUB_API,{headers:{'Accept':'application/vnd.github.v3+json'}});
      if(!res.ok)throw new Error('GitHub API '+res.status);
      const files=await res.json();
      if(Array.isArray(files))
        fileList=files.filter(f=>f.name&&f.name.endsWith('.json')&&f.name!=='index.json'&&f.name!=='manifest.json').map(f=>f.name);
    }catch(e){console.error('[selectme] GitHub API error:',e.message);}
  }

  if(!fileList.length){console.error('[selectme] No JSON files found');return false;}

  // ── Batch fetch: 5 at a time (GitHub CDN rate limit avoid) ──
  const BATCH=6;
  let loaded=0;
  for(let i=0;i<fileList.length;i+=BATCH){
    const batch=fileList.slice(i,i+BATCH);
    const results=await Promise.all(
      batch.map(fname=>fetch(RAW+fname,{cache:'force-cache'}).then(r=>r.ok?r.json():null).catch(()=>null))
    );
    results.forEach(raw=>{
      const art=normalizeArticle(raw);if(!art)return;
      ARTICLES[art.id]=art;
      const catKey=art.cat;
      if(!CATEGORIES[catKey])CATEGORIES[catKey]={icon:'📂',label:art.catLabel||catKey,articles:[]};
      if(!CATEGORIES[catKey].articles.includes(art.id))CATEGORIES[catKey].articles.push(art.id);
      LOADED_CATS.add(catKey);loaded++;
    });
    // First batch వచ్చిన వెంటనే feed show చేయి — user కి instant feel
    if(i===0&&loaded>0&&document.body.classList.contains('feed-mode')){
      _sortCategories();
      var fs=document.getElementById('feedScroll');
      if(fs&&fs.querySelector('.sk-card')){
        // Skeleton తో ఉంటే real content show చేయి
        fs.innerHTML='';
        FEED.buildFiltered();FEED.page=0;FEED.allLoaded=false;
        FEED.loading=false;FEED._lastRenderedDay=null;
        FEED.loadMore();FEED.setupInfiniteScroll();
      }
    }
  }
  _sortCategories();
  console.log('[selectme] Loaded:',loaded,'articles');
  return loaded>0;
}

function _sortCategories(){
  Object.keys(CATEGORIES).forEach(function(catKey){
    CATEGORIES[catKey].articles.sort(function(a,b){
      return (ARTICLES[b]?ARTICLES[b]._ts:0)-(ARTICLES[a]?ARTICLES[a]._ts:0);
    });
  });
}

async function loadCategoryArticles(cat){
  if(LOADED_CATS.has(cat))return true;
  // GitHub Pages: files.php?category= లేదు — loadAllArticles() లో అన్నీ load అయాయి
  const navItem=NAV_STRUCTURE.find(n=>n.key===cat);
  const navSubKeys=(navItem&&navItem.subs)?navItem.subs.map(s=>s.key):[];
  const prefixSubKeys=Object.keys(CATEGORIES).filter(k=>k!==cat&&(k.startsWith(cat+'_')||k.endsWith('_'+cat)));
  const allSubKeys=[...new Set([...navSubKeys,...prefixSubKeys])];
  [...allSubKeys,cat].forEach(k=>LOADED_CATS.add(k));
  return true;
}

  return{icon:'📂',label:cat};
}

    if(activeSub)return a.cat===activeSub;

    return a.cat===cat||subKeys.includes(a.cat)||a.cat.startsWith(cat+'_')||a.cat.endsWith('_'+cat);
  }).sort(function(a,b){return (b._ts||0)-(a._ts||0);}).map(a=>a.id);

  if(!artIds.length){document.getElementById('pageCategory').innerHTML=`<div class="cat-page page-view"><div class="cat-header"><div class="cat-header-icon">${catData.icon||'📂'}</div><div class="cat-header-name">${catData.label||cat}</div></div>${subFilterHtml}<div class="cat-empty"><div class="cat-empty-icon">📭</div><div class="cat-empty-msg">ఈ category లో ఇంకా articles లేవు.</div></div></div>`;return;}
  const feat=ARTICLES[artIds[0]];

  const gridItems=artIds.map(id=>{const a=ARTICLES[id];if(!a)return '';return `<div class="cat-grid-item" onclick="goArticle('${a.cat}','${a.id}')"><div class="rwrap rwrap-cgi-img"><img src="${a.img}" alt="${a.imgAlt}" class="cgi-img"/></div><div class="cgi-title">${a.title}</div><div class="cgi-meta">${a.author} · ${fmtDate(a.date)}</div></div>`;});
  if(gridItems.length>6)gridItems.splice(6,0,`<div style="grid-column:1/-1"></div>`);

function _renderVideoCategory(){
  const catData=CATEGORIES['video']||{icon:'▶',label:'Video'};
  const artVideoIds=Object.values(ARTICLES).filter(a=>a.cat==='video').map(a=>a.id);
  // Build video grid from RSS cache + article videos
  function _buildVideoCatGrid(rssItems){
    var cards='';
    if(rssItems&&rssItems.length){
      cards=rssItems.map(function(v){
        var thumb=v.thumb||('https://picsum.photos/seed/'+encodeURIComponent(v.title.substring(0,8))+'/480/270');
        var onclick=v.videoId?"window.open('https://www.youtube.com/watch?v="+v.videoId+"','_blank')"
          :"window.open('"+v.link.replace(/'/g,"\\'")+"','_blank')";
        return '<div class="cat-grid-item" style="cursor:pointer" onclick="'+onclick+'">'+
          '<div class="rwrap rwrap-cgi-img"><img src="'+thumb+'" alt="'+v.title.replace(/"/g,'&quot;')+'" onerror="this.src=\'https://picsum.photos/seed/vid/480/270\'" class="cgi-img"/>'+
          '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none"><div style="width:32px;height:32px;background:rgba(255,255,255,.85);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;padding-left:2px">▶</div></div></div>'+
          '<div class="cgi-title">'+v.title+'</div>'+
          '<div class="cgi-meta">'+v.source+' · '+fmtDate(v.date)+'</div></div>';
      }).join('');
    }
    // Also append article-based videos
    if(artVideoIds.length){
      cards+=artVideoIds.map(function(id){var a=ARTICLES[id];if(!a)return '';
        return '<div class="cat-grid-item" onclick="goArticle(\''+a.cat+'\',\''+a.id+'\')">'+
          '<div class="rwrap rwrap-cgi-img" style="position:relative"><img src="'+a.img+'" alt="'+a.imgAlt+'" class="cgi-img"/>'+
          '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none"><div style="width:32px;height:32px;background:rgba(255,255,255,.85);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;padding-left:2px">▶</div></div></div>'+
          '<div class="cgi-title">'+a.title+'</div><div class="cgi-meta">'+a.author+' · '+fmtDate(a.date)+'</div></div>';
      }).join('');
    }
    return cards||'<div style="grid-column:1/-1;padding:28px;text-align:center;color:#888">Videos ఇంకా load అవుతున్నాయి…</div>';
  }
  var totalCount=((_rssVideoCache&&_rssVideoCache.length)||0)+artVideoIds.length;
  document.getElementById('pageCategory').innerHTML=
    '<div class="cat-page page-view">'+
    '<div class="cat-header"><div class="cat-header-icon">▶</div>'+
    '<div class="cat-header-name">'+(catData.label||'Video')+'</div>'+
    (totalCount?'<div class="cat-header-count">'+totalCount+' videos</div>':'')+
    '</div>'+
    '<div class="cat-layout"><div class="cat-main">'+
    '<div class="cat-grid" id="videoCatGrid" style="border:1px solid var(--bdr)">'+
      _buildVideoCatGrid(_rssVideoCache)+
    '</div></div></div></div>';
  // If no RSS cache yet, trigger load and refresh grid when done
  if(!_rssVideoCache&&_getRssFeeds().length){
    loadRssVideos().then(function(){
      var g=document.getElementById('videoCatGrid');
      if(g)g.innerHTML=_buildVideoCatGrid(_rssVideoCache);
    });
  }
}

function renderArticle(id){
  const art=ARTICLES[id];if(!art)return;
  if(art.seoTitle)document.title=art.seoTitle;
  setMeta('description',art.seoDescription);setMeta('keywords',art.seoKeywords);
  var _shareImg=art.img||'https://selectme.in/og-image.svg';
  setMeta('og:type','article',true);setMeta('og:title',art.seoTitle||art.title,true);
  setMeta('og:description',art.seoDescription||art.dek,true);setMeta('og:image',_shareImg,true);
  setMeta('og:url',location.href,true);setMeta('og:site_name','Selectme.in',true);
  setMeta('twitter:card','summary_large_image');setMeta('twitter:title',art.seoTitle||art.title);
  setMeta('twitter:description',art.seoDescription||art.dek);setMeta('twitter:image',_shareImg);
  setCanonical(location.href);
  let relatedIds=(art.related||[]).filter(rid=>ARTICLES[rid]&&rid!==art.id);
  if(relatedIds.length<3){const sameCat=Object.values(ARTICLES).filter(a=>a.cat===art.cat&&a.id!==art.id&&!relatedIds.includes(a.id));relatedIds=[...relatedIds,...sameCat.map(a=>a.id)].slice(0,3);}
  if(relatedIds.length<3){const others=Object.values(ARTICLES).filter(a=>a.id!==art.id&&!relatedIds.includes(a.id));relatedIds=[...relatedIds,...others.map(a=>a.id)].slice(0,3);}
  const related=relatedIds.map(rid=>{const r=ARTICLES[rid];if(!r)return '';return `<div class="rel-card" onclick="goArticle('${r.cat}','${r.id}')"><div class="rwrap rwrap-rel-card-img"><img src="${r.img}" alt="${r.imgAlt}" class="rel-card-img"/></div><div class="rel-card-cat">${r.catLabel}</div><div class="rel-card-title">${r.title}</div><div class="rel-card-meta">${r.author} · ${fmtDate(r.date)}</div></div>`;}).join('');
  const tagsHtml=art.tags.length?`<div class="article-tags"><span class="tags-label">🏷️ Tags:</span>${art.tags.map(t=>`<span class="article-tag" onclick="goCategory('news')">${t}</span>`).join('')}</div>`:'';

  // Body HTML

function startShuffleTimers(){if(_countdownTimer)clearInterval(_countdownTimer);_countdownTimer=setInterval(()=>{const el=document.getElementById('shuffleCountdown');if(el)el.textContent=fmtCountdown(secsToNextShuffle());},1000);scheduleNextShuffle();}
function scheduleNextShuffle(){if(_shuffleTimer)clearTimeout(_shuffleTimer);_shuffleTimer=setTimeout(()=>{if(_isOnHomePage){buildHomePage();showPage('pageHome');}scheduleNextShuffle();},secsToNextShuffle()*1000);}

var FEED = {
  activeCat: 'all',
  page: 0,
  perPage: 10,
  loading: false,
  allLoaded: false,
  darkMode: false,
  bookmarks: {},
  filtered: [],
  observer: null,
  shareArt: null,
  _savedScrollY: 0,
  _lastRenderedDay: null,

  // Bottom nav categories config
  bottomNavCats: [
    {key:'all',   icon:'🏠', label:'Home'},
    {key:'politics', icon:'🏛️', label:'Politics'},
    {key:'cinema',   icon:'🎬', label:'Cinema'},
    {key:'sports',   icon:'⚽', label:'Sports'},
    {key:'devotional',icon:'🙏',label:'Bhakti'},
    {key:'jobs',     icon:'💼', label:'Jobs'},
  ],

  init: function() {
    // bookmarks & darkMode already initialized in DOMContentLoaded
    document.body.classList.add('feed-mode');
    // Show feed UI elements
    document.getElementById('feedTopBar').style.display = 'block';
    
    document.getElementById('feedScroll').style.display = 'block';
    // feedBottomNav is always visible on mobile via CSS — no need to force show
    // Mobile లో మాత్రమే sharedHeader hide చేయి
    var sh = document.getElementById('sharedHeader');
    if (sh && window.innerWidth <= 900) sh.style.display = 'none';

    // Don't rebuild bottom nav — already built in DOMContentLoaded
    this.reset();
  },

  reset: function() {
    this.page = 0;
    this.allLoaded = false;
    this.loading = false;
    this._lastRenderedDay = null;
    var fs = document.getElementById('feedScroll');
    fs.innerHTML = '';
    this.buildFiltered();
    this.loadMore();
    this.setupInfiniteScroll();
  },

  buildFiltered: function() {
    var artList = Object.values(ARTICLES);
    // Home feed లో జ్యోతిష్యం / రాశి ఫలాలు categories చూపించకు
    function _isAstroCat(a) {
      var cat = (a.cat || '').toLowerCase();
      var label = (a.catLabel || '').toLowerCase();
      var title = (a.title || '').toLowerCase();
      var engMatch = cat.indexOf('astro') !== -1 || cat.indexOf('horoscope') !== -1 ||
                     cat.indexOf('rasi') !== -1 || cat.indexOf('jyothi') !== -1 ||
                     cat.indexOf('jyoti') !== -1 || cat.indexOf('zodiac') !== -1;
      var telMatch = label.indexOf('జ్యోతి') !== -1 || label.indexOf('రాశి') !== -1 ||
                     label.indexOf('jyothi') !== -1 || label.indexOf('astro') !== -1 ||
                     label.indexOf('horoscope') !== -1 || label.indexOf('rasi') !== -1;
      var titleMatch = title.indexOf('రాశి') !== -1 && (title.indexOf('ఫలాలు') !== -1 || title.indexOf('దినఫలాలు') !== -1);
      return engMatch || telMatch || titleMatch;
    }
    // Same day articles ని shuffle చేసే helper
    function _shuffleWithinDays(arr) {
      // Date (YYYY-MM-DD) ని key గా group చేయి
      var groups = {}, order = [];
      arr.forEach(function(a) {
        var day = (a.date || '').substring(0, 10);
        if (!groups[day]) { groups[day] = []; order.push(day); }
        groups[day].push(a);
      });
      // ప్రతి day group ని shuffle చేయి
      order.forEach(function(day) {
        var g = groups[day];
        for (var i = g.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = g[i]; g[i] = g[j]; g[j] = tmp;
        }
      });
      // Days order maintain చేసి, shuffled articles తిరిగి జోడించు
      var result = [];
      order.forEach(function(day) { result = result.concat(groups[day]); });
      return result;
    }
    if (this.activeCat === 'all') {
      var base = artList.filter(function(a){ return !_isAstroCat(a); })
                        .sort(function(a,b){ return (b._ts||0) - (a._ts||0); });
      this.filtered = _shuffleWithinDays(base);
      return;
    }
    var navItem = NAV_STRUCTURE.find(function(n){return n.key===FEED.activeCat;});
    var subKeys = (navItem && navItem.subs) ? navItem.subs.map(function(s){return s.key;}) : [];
    var base2 = artList.filter(function(a){
      return a.cat===FEED.activeCat || subKeys.includes(a.cat) ||
             a.cat.startsWith(FEED.activeCat+'_') || a.cat.endsWith('_'+FEED.activeCat);
    }).sort(function(a,b){ return (b._ts||0) - (a._ts||0); });
    this.filtered = _shuffleWithinDays(base2);
  },

  loadMore: function() {
    if (this.loading || this.allLoaded) return;
    this.loading = true;
    var fs = document.getElementById('feedScroll');

    // Show dots loader only for infinite scroll (page>0), not initial load
    if (this.page > 0) {
      var loader = document.createElement('div');
      loader.id = 'feedLoader';
      loader.className = 'feed-loader';
      loader.innerHTML = '<div class="feed-loader-dot"></div><div class="feed-loader-dot"></div><div class="feed-loader-dot"></div>';
      fs.appendChild(loader);
    }

    var self = this;
    // Render immediately — no artificial delay
    (function() {
      var start = self.page * self.perPage;
      var batch = self.filtered.slice(start, start + self.perPage);

      var ld = document.getElementById('feedLoader');
      if (ld) ld.remove();

      if (!batch.length) {
        self.allLoaded = true;
        self.loading = false;
        if (self.filtered.length === 0) {
          fs.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#aaa;font-family:\'Outfit\',sans-serif"><div style="font-size:48px;margin-bottom:12px">📭</div><div>ఈ category లో articles లేవు</div></div>';
        }
        return;
      }

      batch.forEach(function(a, i) {
        // ── Date group header ──
        var dayKey = (a.date||'').substring(0,10); // "YYYY-MM-DD"
        if (dayKey && dayKey !== self._lastRenderedDay) {
          self._lastRenderedDay = dayKey;
          var hdr = document.createElement('div');
          hdr.className = 'feed-day-header';
          hdr.textContent = self._dayLabel(dayKey);
          fs.appendChild(hdr);
        }

        var card;
        // Alternate: every 3rd card is compact (text+small image)
        if ((start + i) % 4 === 3) {
          card = self.buildCompactCard(a);
        } else {
          card = self.buildCard(a);
        }
        fs.appendChild(card);
        // Stagger animation
        card.style.opacity = '0';
        card.style.transform = 'translateY(16px)';
        setTimeout(function(){ card.style.transition='opacity .25s ease,transform .25s ease'; card.style.opacity='1'; card.style.transform='translateY(0)'; }, i * 20);

        // ── Ad card: position-based insert ──
        var globalIdx = start + i;
        (function(cardEl, pos) {
          self.getAdForPosition(pos, function(posAd) {
            if (posAd) {
              var adEl = self.buildAdCard(posAd);
              if (adEl && cardEl.parentNode) cardEl.parentNode.insertBefore(adEl, cardEl.nextSibling);
            }
          });
        })(card, globalIdx + 1); // 1-based position
      });

      self.page++;
      self.loading = false;
      if (self.page * self.perPage >= self.filtered.length) self.allLoaded = true;

      // Sentinel ని feedScroll bottom కి తరలించు — IntersectionObserver సరిగ్గా trigger అవుతుంది
      var sentinel = document.getElementById('feedSentinel');
      if (sentinel) fs.appendChild(sentinel);
    })();
  },

            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +

    el.querySelector('.nc-img-wrap').addEventListener('click', function(e){ if(!e.target.closest('button')) FEED.openArticle(a); });

  _adsCache: null,

  _loadAds: function(callback) {
    var self = this;
    var now = Date.now();
    // Use cache if fresh (< 60s)
    if (self._adsCache !== null && (now - self._adsCacheTime) < 60000) {
      return callback(self._adsCache);
    }
    // Try fetching ads.json (works when hosted on a server)
    fetch('ads.json?v=' + now, { cache: 'no-store' })
      .then(function(r) {
        if (!r.ok) throw new Error('not found');
        return r.json();
      })
      .then(function(data) {
        if (Array.isArray(data)) {
          self._adsCache = data;
          self._adsCacheTime = now;
          // Also sync to localStorage so admin panel stays in sync
          try { localStorage.setItem('selectme_ads', JSON.stringify(data)); } catch(e){}
          callback(data);
        } else {
          throw new Error('not array');
        }
      })
      .catch(function() {
        // Fallback: localStorage (used in local/dev environment)
        var ads = [];
        try { ads = JSON.parse(localStorage.getItem('selectme_ads') || '[]'); } catch(e){}
        self._adsCache = ads;
        self._adsCacheTime = now;
        callback(ads);
      });
  },

  getAdForPosition: function(pos, callback) {
    var self = this;
    self._loadAds(function(ads) {
      var match = null;
      ads.forEach(function(ad){
        if (ad.active === false) return;
        var positions = ad.positions || [];
        if (positions.indexOf(pos) !== -1) match = ad;
      });
      callback(match);
    });
  },

  buildAdCard: function(ad) {
    var el = document.createElement('div');
    el.className = 'ad-card';
    // Apply custom background colors if set
    var c1 = ad.color1 || '#e8f5e9';
    var c2 = ad.color2 || '#a5d6a7';
    el.style.background = 'linear-gradient(135deg,' + c1 + ',' + c2 + ')';
    // Auto text color based on brightness of c1
    var isDark = (function(hex){
      hex = hex.replace('#','');
      if(hex.length===3) hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
      var r=parseInt(hex.substr(0,2),16),g=parseInt(hex.substr(2,2),16),b=parseInt(hex.substr(4,2),16);
      return (r*299+g*587+b*114)/1000 < 128;
    })(c1);
    if(isDark){
      el.style.setProperty('--ad-text','#fff');
      el.style.setProperty('--ad-sub','rgba(255,255,255,0.8)');
      el.style.setProperty('--ad-badge-bg','rgba(255,255,255,0.2)');
      el.style.setProperty('--ad-badge-color','#fff');
    } else {
      el.style.setProperty('--ad-text','#111');
      el.style.setProperty('--ad-sub','#1b5e20');
      el.style.setProperty('--ad-badge-bg','rgba(0,0,0,0.08)');
      el.style.setProperty('--ad-badge-color','#333');
    }
    var imgHtml = ad.img
      ? '<img class="ad-card-img" src="' + ad.img + '" alt="sponsored" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=ad-card-noimg>📢</div>\'">'
      : '<div class="ad-card-noimg">📢</div>';

    // Multi-text: split by newlines
    var titleLines = (ad.title||'').split('\n').map(function(l){return l.trim();}).filter(Boolean);
    var titleHtml;
    if (titleLines.length > 1) {
      var slides = titleLines.map(function(line, i) {
        return '<div class="ad-text-slide' + (i===0 ? ' active' : '') + '" data-slide="' + i + '">' +
          '<div class="ad-card-title">' + this._escHtml(line) + '</div>' +
          (ad.sub ? '<div class="ad-card-sub">' + this._escHtml(ad.sub) + '</div>' : '') +
        '</div>';
      }, this).join('');
      titleHtml = '<div class="ad-text-anim">' + slides + '</div>';
    } else {
      titleHtml =
        '<div class="ad-card-title">' + this._escHtml(ad.title||'') + '</div>' +
        (ad.sub ? '<div class="ad-card-sub">' + this._escHtml(ad.sub) + '</div>' : '');
    }

    el.innerHTML =
      '<div class="ad-card-inner">' +
        '<div class="ad-card-body">' +
          '<span class="ad-badge">AD</span>' +
          titleHtml +
        '</div>' +
        imgHtml +
      '</div>';

    // JS-driven text cycling — reliable across all browsers
    if (titleLines.length > 1) {
      var slides = el.querySelectorAll('.ad-text-slide');
      var cur = 0;
      var timer = setInterval(function() {
        if (!el.isConnected) { clearInterval(timer); return; }
        var next = (cur + 1) % slides.length;
        slides[cur].classList.remove('active');
        slides[cur].classList.add('exit');
        var exitEl = slides[cur];
        setTimeout(function(){ exitEl.classList.remove('exit'); }, 450);
        slides[next].classList.add('active');
        cur = next;
      }, 3000);
    }


    el.querySelector('.ad-card-inner').addEventListener('click', function(){
      if (ad.url) window.open(ad.url, '_blank');
    });
    return el;
  },

  _escHtml: function(s) {

  _dayLabel: function(dayKey) {
    // dayKey = "YYYY-MM-DD"
    if (!dayKey) return '';
    var today    = new Date(); today.setHours(0,0,0,0);
    var yesterday= new Date(today); yesterday.setDate(today.getDate()-1);
    var d        = new Date(dayKey + 'T00:00:00');
    if (isNaN(d)) return dayKey;
    if (d.getTime() === today.getTime())     return '📅 ఈ రోజు వార్తలు';
    if (d.getTime() === yesterday.getTime()) return '📅 నిన్న వార్తలు';
    var diff = Math.floor((today - d) / 86400000);
    if (diff < 7) return '📅 ' + diff + ' రోజుల క్రితం వార్తలు';
    try {
      return '📅 ' + d.toLocaleDateString('te-IN', {year:'numeric', month:'long', day:'numeric'});
    } catch(e) {
      return '📅 ' + dayKey;
    }
  },

  timeAgo: function(dateStr) {
    if(!dateStr) return '';
    var now = Date.now();
    var _d = _parseDate(dateStr);
    var then = _d ? _d.getTime() : NaN;
    if(isNaN(then)) return dateStr;
    var diff = Math.floor((now - then) / 1000);
    if(diff < 60)   return diff + ' సెకన్ల క్రితం';
    if(diff < 3600) return Math.floor(diff/60) + ' నిమిషాల క్రితం';
    if(diff < 86400)return Math.floor(diff/3600) + ' గంటల క్రితం';
    var days = Math.floor(diff/86400);
    if(days === 1)  return 'నిన్న';
    if(days < 7)    return days + ' రోజుల క్రితం';
    if(days < 30)   return Math.floor(days/7) + ' వారాల క్రితం';
    if(days < 365)  return Math.floor(days/30) + ' నెలల క్రితం';
    return Math.floor(days/365) + ' సంవత్సరాల క్రితం';
  },

var _rssVideoCache=null;
var _rssVideoLoading=false;

function _getRssFeeds(){
  // Load RSS feed URLs from localStorage (saved by ads-admin.html RSS Manager)
  try{
    var stored=JSON.parse(localStorage.getItem('selectme_rss_feeds')||'[]');
    return Array.isArray(stored)?stored.filter(f=>f.url&&f.enabled!==false):[];
  }catch{return[];}
}

async function _fetchRssFeed(feedObj){
  // Use allorigins.win CORS proxy to fetch RSS
  var url=feedObj.url.trim();
  var proxy='https://api.allorigins.win/get?url='+encodeURIComponent(url);
  try{
    var res=await fetch(proxy,{signal:AbortSignal.timeout(8000)});
    if(!res.ok)throw new Error('HTTP '+res.status);
    var data=await res.json();
    var xml=data.contents||'';
    var parser=new DOMParser();
    var doc=parser.parseFromString(xml,'application/xml');
    var items=Array.from(doc.querySelectorAll('item,entry'));
    return items.slice(0,8).map(function(item){
      var title=(item.querySelector('title')||{}).textContent||'';
      var link=(item.querySelector('link')||{}).textContent||(item.querySelector('link')||{}).getAttribute&&item.querySelector('link').getAttribute('href')||'';
      var pubDate=(item.querySelector('pubDate,published,updated')||{}).textContent||'';
      // Try to extract thumbnail from media:thumbnail, enclosure, or og in description
      var thumb='';
      var mediaTh=item.querySelector('thumbnail')||item.querySelector('[url]');
      if(mediaTh)thumb=mediaTh.getAttribute('url')||mediaTh.getAttribute('href')||'';
      if(!thumb){var enc=item.querySelector('enclosure[type^="image"]');if(enc)thumb=enc.getAttribute('url')||'';}
      if(!thumb){
        // Try to parse img from description/content
        var desc=(item.querySelector('description,summary,content')||{}).textContent||'';
        var imgMatch=desc.match(/<img[^>]+src=["']([^"']+)["']/i);
        if(imgMatch)thumb=imgMatch[1];
      }
      // Extract YouTube video ID if possible
      var videoId='';
      var ytMatch=(link||'').match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
      if(ytMatch){videoId=ytMatch[1];if(!thumb)thumb='https://img.youtube.com/vi/'+videoId+'/mqdefault.jpg';}
      var dStr='';
      if(pubDate){try{var d=new Date(pubDate);if(!isNaN(d))dStr=d.toLocaleDateString('te-IN')||d.toLocaleDateString();}catch{}}
      return{title:title.trim(),link:link.trim(),thumb:thumb,videoId:videoId,date:dStr,source:feedObj.label||'Video'};
    }).filter(function(v){return v.title&&v.link;});
  }catch(e){console.warn('[RSS]',feedObj.url,e.message);return[];}
}

function _buildArticleVideoItems(){

    return '<div class="vg-card" onclick="goArticle(\''+a.cat+'\',\''+a.id+'\')">'+
      '<div class="vg-img"><img src="'+a.img+'" alt="'+a.imgAlt+'"/>'+

}

async function loadRssVideos(){
  if(_rssVideoLoading)return;
  _rssVideoLoading=true;
  var feeds=_getRssFeeds();
  var gridEl=document.getElementById('videoGrid');
  if(!gridEl){_rssVideoLoading=false;return;}
  if(!feeds.length){_rssVideoLoading=false;return;}
  gridEl.innerHTML='<div class="vb-loader" style="grid-column:1/-1"><div class="mini-spin"></div>Videos load అవుతున్నాయి…</div>';
  var allItems=[];
  await Promise.all(feeds.map(async function(f){
    var items=await _fetchRssFeed(f);
    allItems=allItems.concat(items);
  }));
  // Dedupe by link, limit to 8
  var seen=new Set();
  allItems=allItems.filter(function(v){if(seen.has(v.link))return false;seen.add(v.link);return true;}).slice(0,8);
  _rssVideoCache=allItems;
  _rssVideoLoading=false;
  // If RSS returned nothing, fall back to article-based cards
  if(!allItems.length){
    var fb=_buildArticleVideoItems();
    gridEl.innerHTML=fb||'';
    return;
  }
  _renderVideoBand(gridEl,allItems);
}

function _renderVideoBand(gridEl,items){
  if(!items||!items.length){
    // Final fallback to article videos
    var fb=_buildArticleVideoItems();
    gridEl.innerHTML=fb||'<div style="color:#555;font-size:12px;padding:14px 0;grid-column:1/-1">Videos అందుబాటులో లేవు.</div>';
    return;
  }
  gridEl.innerHTML=items.slice(0,8).map(function(v){
    var thumb=v.thumb||'https://picsum.photos/seed/'+encodeURIComponent(v.title.substring(0,10))+'/480/270';
    var onclick=v.videoId?
      "window.open('https://www.youtube.com/watch?v="+v.videoId+"','_blank')":
      "window.open('"+v.link.replace(/'/g,"\\'")+"','_blank')";
    return '<div class="vg-card" onclick="'+onclick+'">'+
      '<div class="vg-img"><img src="'+thumb+'" alt="'+v.title.replace(/"/g,'&quot;')+'" onerror="this.src=\'https://picsum.photos/seed/vid/480/270\'"/>'+
      '<div class="vg-play"><div class="vg-play-btn">▶</div></div></div>'+
      '<div class="vg-body"><div class="vg-cat">'+v.source+'</div>'+
      '<div class="vg-title">'+v.title.substring(0,60)+(v.title.length>60?'…':'')+'</div>'+
      '<div class="vg-meta">'+fmtDate(v.date)+'</div></div></div>';
  }).join('');
}

  s.src='//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
  document.body.appendChild(s);
}
function _applyGT(lang){
  var tries=0,iv=setInterval(function(){
    var sel=document.querySelector('.goog-te-combo');
    if(sel){clearInterval(iv);sel.value=lang==='en'?'en':'te';sel.dispatchEvent(new Event('change'));}
    else if(++tries>40)clearInterval(iv);
  },150);
}
function activateTranslate(lang){
  if(lang==='en'){
    _initGT();setTimeout(function(){_applyGT('en');},600);
    document.documentElement.setAttribute('lang','en');
  } else {
    var sel=document.querySelector('.goog-te-combo');
    if(sel){sel.value='te';sel.dispatchEvent(new Event('change'));}
    // GT restore button fallback
    var frame=document.querySelector('.goog-te-banner-frame');
    if(frame){try{var d=frame.contentDocument||frame.contentWindow.document;var b=d.querySelector('[id$=restore]')||d.querySelector('button');if(b)b.click();}catch(e){}}
    document.documentElement.setAttribute('lang','te');
  }
}
function artTitle(a){return CURRENT_LANG==='en'&&a.titleEn?a.titleEn:a.title;}
function artDek(a){if(CURRENT_LANG==='en'){const enText=a.bodyEn?a.bodyEn.replace(/<[^>]+>/g,'').substring(0,180)+'…':'';return enText||a.dek;}return a.dek||a.body.replace(/<[^>]+>/g,'').substring(0,180)+'…';}

// ── Date formatter: JSON date → Telugu readable string ──
function _parseDate(dateStr){
  if(!dateStr) return null;
  // DD/MM/YYYY లేదా DD-MM-YYYY → ISO గా convert చేయి
  var m=dateStr.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})(.*)/);
  if(m){
    var iso=m[3]+'-'+(m[2].length<2?'0':'')+m[2]+'-'+(m[1].length<2?'0':'')+m[1]+(m[4]||'');
    var d2=new Date(iso);
    if(!isNaN(d2.getTime()))return d2;
  }
  var d=new Date(dateStr);
  return isNaN(d.getTime())?null:d;
}
function fmtDate(dateStr){
  if(!dateStr) return '';
  var d = _parseDate(dateStr);
  if(!d) return dateStr;
  var now = new Date(); now.setHours(0,0,0,0);
  var day = new Date(d); day.setHours(0,0,0,0);
  var diff = Math.floor((now - day) / 86400000);
  if(diff === 0){
    var h=d.getHours(), m=d.getMinutes(), ap=h>=12?'PM':'AM';
    h=h%12||12;
    return 'ఈ రోజు ' + (h<10?'0':'')+h+':'+(m<10?'0':'')+m+' '+ap;
  }
  if(diff === 1) return 'నిన్న';
  if(diff < 7)   return diff + ' రోజుల క్రితం';
  try {
    return d.toLocaleDateString('te-IN',{year:'numeric',month:'long',day:'numeric'});
  } catch(e) {
    return d.toLocaleDateString('en-IN',{year:'numeric',month:'short',day:'numeric'});
  }
}

function copyLink(btn){var url=location.href;if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(()=>_showCopied(btn)).catch(()=>_fallbackCopy(url,btn));}else _fallbackCopy(url,btn);}
function _fallbackCopy(text,btn){var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');_showCopied(btn);}catch(e){}document.body.removeChild(ta);}
function _showCopied(btn){var orig=btn.textContent;btn.textContent='✓ Copied!';btn.style.background='#166534';btn.style.color='#fff';btn.style.borderColor='#166534';setTimeout(()=>{btn.textContent=orig;btn.style.background='';btn.style.color='';btn.style.borderColor='';},2000);}

function shareToX(){var title=document.querySelector('.article-headline');var text=title?title.textContent.substring(0,100):document.title;window.open('https://x.com/intent/tweet?url='+encodeURIComponent(location.href)+'&text='+encodeURIComponent(text),'_blank','width=600,height=400');}

  showPage('pageHome');
  var btn=document.getElementById('retryBtn');
  if(btn){btn.addEventListener('click',async function(){
    btn.disabled=true;btn.textContent='Loading…';
    showLoader();
    var ok=await loadAllArticles();
    if(!ok){_showLoadError();}
    else{restoreState();startShuffleTimers();}
  });}
}

// ── Shuffle timers: ప్రతి 5 నిమిషాలకు same-day articles re-shuffle అవుతాయి ──
var _shuffleTimer = null;
function startShuffleTimers() {
  if (_shuffleTimer) clearInterval(_shuffleTimer);
  _shuffleTimer = setInterval(function() {
    // Feed active గా ఉంటేనే re-shuffle చేయి
    if (document.body.classList.contains('feed-mode') && typeof FEED !== 'undefined') {
      FEED.buildFiltered();
      FEED.page = 0;
      FEED.allLoaded = false;
      FEED.loading = false;
      FEED._lastRenderedDay = null;
      var fs = document.getElementById('feedScroll');
      if (fs) fs.innerHTML = '';
      FEED.loadMore();
      FEED.setupInfiniteScroll();
    }
  }, 5 * 60 * 1000); // 5 minutes
}

window.addEventListener('DOMContentLoaded',async function(){
  showLoader();
  const[articlesOk]=await Promise.all([loadAllArticles(),loadNavFromSheet()]);
  // Build bottom nav immediately for all pages
  FEED.bookmarks = JSON.parse(localStorage.getItem('sm_bookmarks') || '{}');
  FEED.darkMode  = localStorage.getItem('sm_dark') === '1';
  if(FEED.darkMode) document.body.classList.add('dark');
  FEED.buildBottomNav();
  // Clear skeleton before real content loads
  var fs=document.getElementById('feedScroll');if(fs)fs.innerHTML='';
  if(!articlesOk){_showLoadError();}
  else{restoreState();startShuffleTimers();
    // Load RSS video feeds — fallback to article videos if RSS empty/fails
    setTimeout(function(){
      var feeds=_getRssFeeds();
      var badge=document.getElementById('rssBadge');
      if(feeds.length){
        if(badge)badge.style.display='';
        loadRssVideos();
      }
      // No feeds → videoGrid already has article-based videos from buildHomePage, nothing to do
    },600);
  }
  initUI();
});
