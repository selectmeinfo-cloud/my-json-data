<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Selectme.in — తెలుగు వార్తలు</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Outfit:wght@300;400;500;600;700;800&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,400&family=Noto+Sans+Telugu:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{background:#f9f8f5;color:#111;font-family:'Outfit',sans-serif;line-height:1.5;overflow-x:hidden}
a{color:inherit;text-decoration:none;transition:color .15s;cursor:pointer}
a:hover{color:#222}
img{display:block;width:100%;object-fit:cover;background:#e5e3de}
:root{
  --red:#c8001e;--ink:#111;--ink2:#2e2e2e;--ink3:#555;--ink4:#888;--ink5:#bbb;
  --bg:#f9f8f5;--bg2:#f2f0eb;--bg3:#e8e5de;--bdr:#dddbd5;--bdr2:#c8c6c0;
  --telugu:'Noto Sans Telugu','Arial Unicode MS',Arial,sans-serif;--display:'Playfair Display',Georgia,serif;
  --serif:'Source Serif 4',Georgia,serif;--max:1140px;
  --trending-h:36px;--toputil-h:36px;--masthead-h:94px;--nav-h:42px;
  --header-full-h:calc(var(--trending-h) + var(--toputil-h) + var(--masthead-h) + var(--nav-h));
}
.loader{width:36px;height:36px;border:3px solid var(--bdr);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.page-view{animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.rwrap{position:relative;overflow:hidden;display:block}
.rwrap img{display:block;width:100%;height:100%;object-fit:cover}
.wm-logo{position:absolute!important;top:15px!important;right:15px!important;pointer-events:none!important;z-index:20!important;opacity:0.7!important;line-height:0!important;display:block!important;background:none!important}
.wm-strip{position:absolute!important;bottom:25px!important;left:0!important;right:0!important;height:20px!important;background:rgba(0,0,0,0.44)!important;overflow:hidden!important;pointer-events:none!important;z-index:20!important;display:flex!important;align-items:center!important;contain:layout style!important;isolation:isolate!important}
.wm-strip-inner{display:flex!important;white-space:nowrap!important;animation:wm-scroll 18s linear infinite!important;gap:0!important;will-change:transform!important;backface-visibility:hidden!important;-webkit-backface-visibility:hidden!important;transform:translateZ(0)!important}
.wm-strip-inner span{font-family:'Outfit',sans-serif!important;font-size:8px!important;font-weight:700!important;color:rgba(255,255,255,0.80)!important;letter-spacing:0.14em!important;text-transform:lowercase!important;padding:0 20px!important;border-right:1px solid rgba(255,255,255,0.18)!important;line-height:1!important}
@keyframes wm-scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.rwrap .wm-dl-btn,.article-hero-wrap .wm-dl-btn{position:absolute!important;bottom:24px!important;right:0px!important;z-index:25!important;background:#c8001e!important;color:#fff!important;border:none!important;padding:5px 11px!important;font-size:8px!important;font-weight:700!important;font-family:'Outfit',sans-serif!important;letter-spacing:.1em!important;text-transform:uppercase!important;cursor:pointer!important;opacity:0!important;transition:opacity .2s,background .15s!important;pointer-events:auto!important;border-radius:10px 0 0 10px}
.rwrap:hover .wm-dl-btn,.article-hero-wrap:hover .wm-dl-btn{opacity:1!important}
.rwrap .wm-dl-btn:hover,.article-hero-wrap .wm-dl-btn:hover{background:rgba(200,0,30,0.85)!important}
.rwrap-t4-img{height:105px;margin-bottom:8px}
.rwrap-pub-big-img{height:280px;margin-bottom:10px}
.rwrap-prt-img{height:130px;margin-bottom:8px}
.rwrap-pri-img{height:52px}
.rwrap-fl-img{height:210px;margin-bottom:10px}
.rwrap-fri-img{height:52px}
.rwrap-pop-img{height:105px;margin-bottom:7px}
.rwrap-tt-img{height:130px;margin-bottom:8px}
.rwrap-tri-img{height:44px}
.rwrap-mci-img{width:62px;height:46px;flex-shrink:0;display:inline-block}
.rwrap-rel-card-img{height:100px;margin-bottom:7px}
.rwrap-cat-feat-img{height:220px;margin-bottom:10px}
.rwrap-cfi-img{height:54px}
.rwrap-cgi-img{height:110px;margin-bottom:8px;position:relative}
.article-hero-wrap{position:relative;overflow:hidden;display:block;margin-bottom:8px}
.article-hero-wrap img{display:block;width:100%;height:380px;object-fit:cover}
.trending{background:#111;height:var(--trending-h);display:flex;overflow:hidden;border-bottom:1px solid #1e1e1e;contain:layout style;isolation:isolate;transform:translateZ(0);will-change:transform}
.tr-label{background:var(--red);color:#fff;font-size:8px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;padding:0 18px;display:flex;align-items:center;gap:8px;flex-shrink:0;position:relative}
.tr-label::after{content:'';position:absolute;right:-10px;top:0;bottom:0;width:20px;background:var(--red);clip-path:polygon(0 0,100% 50%,0 100%)}
.tr-live{width:6px;height:6px;background:#fff;border-radius:50%;animation:pulse 1.4s ease infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.tr-scroll{flex:1;overflow:hidden;display:flex;align-items:center;padding-left:16px}
.tr-track{display:flex;white-space:nowrap;animation:mscroll 300s linear infinite;align-items:center;will-change:transform;backface-visibility:hidden;-webkit-backface-visibility:hidden;transform:translateZ(0)}
.tr-track:hover{animation-play-state:paused}
.tr-track a{font-size:13px;color:rgba(255,255,255,.55);padding:0 0 0 28px;display:inline-flex;align-items:center;gap:8px;transition:color .2s;height:36px}
.tr-track a::before{content:'';width:4px;height:4px;background:var(--red);border-radius:50%;flex-shrink:0;opacity:.7}
.tr-track a:hover{color:#fff}
.tr-track a::after{content:'';display:inline-block;width:1px;height:14px;background:#2e2e2e;margin-left:28px}
@keyframes mscroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.toputil{background:#0a0a0a;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1),opacity .35s ease}
.tu-in{max-width:var(--max);margin:0 auto;padding:0 20px;display:flex;justify-content:space-between;align-items:center;height:var(--toputil-h);font-size:10px;border-bottom:1px solid #1c1c1c}
.tu-left{display:flex;gap:0;align-items:center}
.tu-chip{display:flex;align-items:center;gap:6px;padding:0 12px;height:36px;border-right:1px solid #1c1c1c;font-size:10px}
.tu-chip:first-child{padding-left:0}
#topDate{color:rgba(255,255,255,.5);font-weight:500;letter-spacing:.02em}
#topTime{color:#d4a017;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.06em}
.tu-dot{width:3px;height:3px;background:#d4a017;border-radius:50%}
.tu-links{display:flex;align-items:center}
.tu-links a{color:rgba(255,255,255,.35);font-size:9.5px;letter-spacing:.05em;padding:0 10px;height:36px;display:flex;align-items:center;border-right:1px solid #1c1c1c;transition:color .2s,background .2s}
.tu-links a:hover{color:#fff;background:#161616}
.tu-right{display:flex;align-items:center;gap:0}
.tu-ed{display:flex;align-items:center;gap:6px;padding:0 12px;height:36px;border-left:1px solid #1c1c1c;font-size:9.5px;color:rgba(255,255,255,.3)}
.tu-ed a{color:rgba(255,255,255,.35);transition:color .2s}.tu-ed a:hover{color:#fff}.tu-ed a.active{color:#d4a017;font-weight:700}
.tu-social{display:flex;height:36px;border-left:1px solid #1c1c1c}
.tu-social a{width:34px;height:36px;display:flex;align-items:center;justify-content:center;font-size:11px;color:rgba(255,255,255,.3);border-right:1px solid #1c1c1c;transition:all .2s}
.tu-social a:hover{background:var(--red);color:#fff}
.masthead{padding:12px 0 10px;background:#fff;border-bottom:1px solid #111;box-shadow:0 1px 0 0 var(--red)}
.mh-in{max-width:var(--max);margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.mh-left{flex:1}
.logo-sub{font-size:8px;color:var(--ink4);letter-spacing:.5em;text-transform:uppercase;margin-top:5px}
.mh-center{text-align:center;flex:0 0 auto}
.mh-right{flex:1;display:flex;justify-content:flex-end;align-items:center;gap:10px}
.srch-box{display:flex;border:1.5px solid var(--bdr2);overflow:hidden}
.srch-box input{width:158px;height:30px;border:none;padding:0 10px;font-size:11.5px;outline:none;font-family:'Outfit',sans-serif;background:#fff}
.srch-box input::placeholder{color:var(--ink5)}
.srch-box button{background:#111;color:#fff;border:none;width:32px;height:30px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.srch-box button:hover{background:var(--red)}
.mainnav{background:#fff;border-bottom:3px solid #111;position:sticky;top:0;z-index:1000;transition:box-shadow .3s ease,border-color .3s ease;contain:layout style;isolation:isolate;transform:translateZ(0);will-change:transform}
.mainnav.nav-fixed{position:fixed;top:var(--trending-h);left:0;right:0;z-index:999;box-shadow:0 4px 28px rgba(0,0,0,.15);border-bottom-color:var(--red)}
.trending.tr-fixed{position:fixed;top:0;left:0;right:0;z-index:1000}
#navSpacer{height:0;transition:height .3s ease}
#navSpacer.active{height:calc(var(--trending-h) + var(--nav-h))}
.mn-in{max-width:var(--max);margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:flex-start;height:42px;gap:0}
.mn-links{display:flex;height:100%;flex:1;overflow:visible}
.mn-links > a{font-size:10px;font-weight:700;color:#444;padding:0 14px;height:100%;display:flex;align-items:center;text-transform:uppercase;letter-spacing:.1em;border-right:1px solid var(--bdr);position:relative;overflow:hidden;transition:color .2s;white-space:nowrap;cursor:pointer}
.mn-links > a::before{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--red);transform:translateY(3px);transition:transform .25s ease}
.mn-links > a:hover{color:#111}
.mn-links > a:hover::before{transform:translateY(0)}
.mn-links > a.home{background:#111;color:#fff;font-weight:800;letter-spacing:.14em}
.mn-links > a.home::before{display:none}
.mn-links > a.home:hover{background:var(--red)}
.mn-links > a.active-nav{color:var(--red)}
.mn-links > a.active-nav::before{transform:translateY(0)}
.nav-item{position:relative;height:100%;display:flex;align-items:stretch}
.nav-item-btn{font-size:10px;font-weight:700;color:#444;padding:0 14px;height:100%;display:flex;align-items:center;text-transform:uppercase;letter-spacing:.1em;border-right:1px solid var(--bdr);position:relative;overflow:hidden;transition:color .2s;white-space:nowrap;cursor:pointer;background:none;border-top:none;border-bottom:none;border-left:none;font-family:'Outfit',sans-serif;gap:4px}
.nav-item-btn::before{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--red);transform:translateY(3px);transition:transform .25s ease}
.nav-item-btn:hover{color:#111}
.nav-item-btn:hover::before,.nav-item.open .nav-item-btn::before{transform:translateY(0)}
.nav-item.open .nav-item-btn{color:var(--red)}
.nav-item-btn .nav-arr{font-size:7px;transition:transform .2s;display:inline-block;line-height:1}
.nav-item.open .nav-item-btn .nav-arr{transform:rotate(180deg)}
.nav-item-btn.active-nav{color:var(--red)}
.nav-item-btn.active-nav::before{transform:translateY(0)}
.nav-submenu{display:none!important}
.nav-submenu-item{display:block;padding:10px 16px;font-size:10px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--bdr);transition:background .15s,color .15s;white-space:nowrap;cursor:pointer;font-family:'Outfit',sans-serif;position:relative}
.nav-submenu-item:last-child{border-bottom:none}
.nav-submenu-item:hover{background:var(--bg2);color:var(--red)}
.nav-submenu-item.active-sub{color:var(--red);background:#fff5f5;font-weight:800}
.nav-submenu-item.active-sub::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red)}
.nav-submenu-item.all-item{color:var(--ink3);font-style:italic;font-weight:600;border-bottom:2px solid var(--bdr)}
.nav-submenu-item.all-item:hover{color:var(--red);background:var(--bg2)}
.mn-more{position:relative;height:100%;display:flex;align-items:center;flex-shrink:0}
.mn-more-btn{font-size:10px;font-weight:700;color:#444;padding:0 14px;height:42px;display:flex;align-items:center;text-transform:uppercase;letter-spacing:.1em;border-right:1px solid var(--bdr);border-left:1px solid var(--bdr);cursor:pointer;gap:5px;background:#fff;border-top:none;border-bottom:none;white-space:nowrap;transition:color .2s;font-family:'Outfit',sans-serif}
.mn-more-btn:hover{color:var(--red)}
.mn-more-btn .arr{font-size:8px;transition:transform .2s}
.mn-more.open .mn-more-btn .arr{transform:rotate(180deg)}
.mn-dropdown{display:none;position:absolute;top:42px;left:0;background:#fff;border:1px solid var(--bdr);border-top:3px solid var(--red);min-width:200px;z-index:2000;box-shadow:0 8px 24px rgba(0,0,0,.12);animation:dropIn .18s ease both}
.mn-more.open .mn-dropdown{display:block}
.mn-dropdown a{display:block;padding:9px 16px;font-size:10px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--bdr);transition:background .15s,color .15s;white-space:nowrap;cursor:pointer}
.mn-dropdown a:last-child{border-bottom:none}
.mn-dropdown a:hover{background:var(--bg2);color:var(--red)}
#navLogo{opacity:0;width:0;overflow:hidden;transition:opacity .3s ease,width .3s ease,margin-right .3s ease;display:flex;align-items:center;flex-shrink:0;margin-right:0;cursor:pointer}
.nav-fixed #navLogo{opacity:1;width:120px;margin-right:14px}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;background:none;border:none;margin-left:auto}
.hamburger span{width:22px;height:2px;background:#111;display:block;transition:all .2s}
.mob-menu{display:none;flex-direction:column;background:#fff;border-bottom:2px solid var(--ink);position:absolute;top:42px;left:0;right:0;z-index:900;box-shadow:0 4px 16px rgba(0,0,0,.12);max-height:70vh;overflow-y:auto}
.mob-menu.open{display:flex}
.mob-menu a,.mob-menu button{font-size:13px;font-weight:700;color:var(--ink);padding:10px 20px;border-bottom:1px solid var(--bdr);text-transform:uppercase;letter-spacing:.05em;background:none;border-left:none;border-right:none;border-top:none;font-family:'Outfit',sans-serif;text-align:left;cursor:pointer;width:100%;display:block}
.mob-menu a.home-m{background:var(--ink);color:#fff}
.mob-menu .mob-cat-hd{background:var(--bg2);color:var(--ink4);font-size:9px;font-weight:800;letter-spacing:.15em;padding:6px 20px;border-bottom:1px solid var(--bdr);text-transform:uppercase;cursor:pointer}
.mob-menu .mob-cat-hd:hover{background:var(--bg3);color:var(--red)}
.mob-menu .mob-sub-item{padding:9px 32px;font-size:11.5px;color:var(--ink3);border-bottom:1px solid var(--bdr);background:#fafaf7;letter-spacing:.04em;text-transform:uppercase;font-weight:600}
.mob-menu .mob-sub-item:hover{color:var(--red);background:var(--bg2)}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:800}
.mob-overlay.open{display:block}
.nav-sheet-loading{font-size:9px;color:#aaa;padding:0 12px;display:flex;align-items:center;gap:5px}
.nav-sheet-loading .mini-spin{width:10px;height:10px;border:1.5px solid #ddd;border-top-color:var(--red);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
.page{max-width:var(--max);margin:0 auto;padding:0 20px}
.sec-hd{display:flex;align-items:flex-end;gap:0;border-bottom:3px solid var(--ink);margin-bottom:0;padding-bottom:0}
.sec-hd .lbl{font-size:9px;font-weight:800;color:#fff;background:var(--ink);padding:4px 12px;letter-spacing:.14em;text-transform:uppercase;display:inline-block;margin-bottom:-3px}
.sec-hd .more{margin-left:auto;font-size:9.5px;color:var(--ink4);font-weight:600;padding-bottom:5px;letter-spacing:.03em;transition:color .15s}
.sec-hd .more:hover{color:var(--red)}
.top4-wrapper{position:relative;overflow:hidden;background:var(--bg);border-bottom:1px solid var(--bdr);contain:layout style;isolation:isolate;transform:translateZ(0)}
.top4-wrapper::before,.top4-wrapper::after{content:'';position:absolute;top:0;bottom:0;width:80px;z-index:10;pointer-events:none}
.top4-wrapper::before{left:0;background:linear-gradient(to right,var(--bg) 30%,transparent)}
.top4-wrapper::after{right:0;background:linear-gradient(to left,var(--bg) 30%,transparent)}
.top4-track{display:flex;animation:scroll-rtl 200s linear infinite;width:max-content;will-change:transform;backface-visibility:hidden;-webkit-backface-visibility:hidden;transform:translateZ(0)}
.top4-track:hover{animation-play-state:paused}
@keyframes scroll-rtl{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.top4-track .t4-card{width:270px;flex-shrink:0;padding:12px 14px;border-right:1px solid var(--bdr);cursor:pointer;transition:background .15s}
.top4-track .t4-card:hover{background:var(--bg2)}
.top4-track .t4-card:hover .t4-title{color:var(--red)}
.t4-img{height:105px;margin-bottom:8px}
.t4-cat{font-size:8.5px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.t4-title{font-size:15px;font-weight:700;color:var(--ink);line-height:1.3;transition:color .15s}
.t4-meta{font-size:9px;color:var(--ink4);margin-top:4px}
.main-layout{display:grid;grid-template-columns:1fr 300px;gap:22px;margin-top:16px}
.col-content{display:flex;flex-direction:column;gap:22px}
.pub-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.pub-left{border-right:1px solid var(--bdr);padding-right:14px}
.pub-big-img{height:280px;margin-bottom:10px}
.pub-big-title{font-size:26px;font-weight:700;color:var(--ink);line-height:1.2;margin-bottom:7px;cursor:pointer;transition:color .15s}
.pub-big-title:hover{color:var(--red)}
.pub-big-dek{font-size:12.5px;color:var(--ink3);line-height:1.7;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.pub-big-meta{font-size:9.5px;color:var(--ink4);margin-top:8px}
.pub-right{padding-left:14px;display:flex;flex-direction:column;gap:0}
.pub-right-top{border-bottom:1px solid var(--bdr);padding-bottom:12px;margin-bottom:12px;cursor:pointer}
.pub-right-top:hover .prt-title{color:var(--red)}
.prt-img{height:130px;margin-bottom:8px}
.prt-title{font-size:18px;font-weight:700;color:var(--ink);line-height:1.25;margin-bottom:5px;transition:color .15s}
.prt-dek{font-size:12px;color:var(--ink3);line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.prt-meta{font-size:9.5px;color:var(--ink4);margin-top:6px}
.pub-right-items{display:flex;flex-direction:column;gap:0}
.pri-item{padding:8px 0;border-bottom:1px solid var(--bdr);cursor:pointer;display:grid;grid-template-columns:1fr 70px;gap:8px;align-items:start}
.pri-item:last-child{border-bottom:none}
.pri-item:hover .pri-title{color:var(--red)}
.pri-title{font-size:13px;font-weight:700;color:var(--ink);line-height:1.3;transition:color .15s}
.pri-meta{font-size:9px;color:var(--ink4);margin-top:3px}
.pri-img{height:52px}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.feat-left{border-right:1px solid var(--bdr);padding-right:14px;cursor:pointer}
.feat-left:hover .fl-title{color:var(--red)}
.fl-img{height:210px;margin-bottom:10px}
.fl-cat{font-size:9px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.fl-title{font-size:22px;font-weight:700;color:var(--ink);line-height:1.2;margin-bottom:7px;transition:color .15s}
.fl-dek{font-size:12.5px;color:var(--ink3);line-height:1.7;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
.fl-meta{font-size:9.5px;color:var(--ink4);margin-top:8px;display:flex;gap:8px;align-items:center}
.fl-readmore{font-size:9.5px;font-weight:700;color:var(--ink);border-bottom:1.5px solid var(--ink);padding-bottom:1px;letter-spacing:.04em;transition:all .15s;display:inline-block;margin-top:8px}
.fl-readmore:hover{color:var(--red);border-color:var(--red)}
.feat-right{padding-left:14px;display:flex;flex-direction:column;gap:0}

.ft-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.ft-logo{font-size:30px;font-weight:900;color:#fff;line-height:1}
.ft-tagline{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.14em;margin-top:3px}
.ft-bottom{border-top:1px solid #222;padding-top:10px;display:flex;justify-content:space-between;align-items:center;font-size:9.5px;color:#333;flex-wrap:wrap;gap:5px}
.ft-bottom .live{display:flex;align-items:center;gap:5px;color:#4ade80;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-size:9px}
.live-dot{width:5px;height:5px;background:#4ade80;border-radius:50%;animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.ft-soc{display:flex;gap:1px}
.ft-soc a{width:24px;height:24px;background:#1a1a1a;border:1px solid #2a2a2a;color:#666;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ft-soc a:hover{background:var(--red);color:#fff;border-color:var(--red)}
#backToTop{position:fixed;bottom:22px;right:22px;width:38px;height:38px;background:var(--ink);color:#fff;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:2000;opacity:0;transform:translateY(10px);transition:opacity .3s ease,transform .3s ease,background .15s;box-shadow:0 2px 12px rgba(0,0,0,.25)}
#backToTop.show{opacity:1;transform:translateY(0)}
#backToTop:hover{background:var(--red)}
.ad-wrap{text-align:center;background:var(--bg2);border:1px solid var(--bdr);padding:6px;margin:14px 0;position:relative}
.ad-wrap .ad-label{font-size:7.5px;color:var(--ink5);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.ad-banner{width:100%;height:90px;background:linear-gradient(90deg,#1a1a2e,#16213e,#0f3460);display:flex;align-items:center;justify-content:space-between;padding:0 24px;cursor:pointer;overflow:hidden}
.ad-incontent{width:100%;height:280px;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);display:flex;align-items:center;justify-content:center;gap:24px;cursor:pointer;padding:0 24px}
#adPopup{display:none;position:fixed;inset:0;z-index:9999;align-items:center;justify-content:center}
#adPopup.show{display:flex}
.popup-overlay{position:absolute;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(3px)}
.popup-box{position:relative;z-index:1;background:#fff;max-width:480px;width:90%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4);animation:popIn .35s cubic-bezier(.34,1.56,.64,1) both}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.popup-close{position:absolute;top:10px;right:12px;background:rgba(0,0,0,.5);color:#fff;border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;z-index:2;transition:background .15s}
.popup-close:hover{background:var(--red)}
.popup-img-area{width:100%;height:160px;background:linear-gradient(135deg,#111 0%,#c8001e 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.popup-body{padding:20px 24px 24px}
.popup-tag{font-size:8.5px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.18em;margin-bottom:8px}
.popup-title{font-size:22px;font-weight:900;color:var(--ink);line-height:1.2;margin-bottom:8px}
.popup-sub{font-size:12px;color:var(--ink3);line-height:1.6;margin-bottom:16px}
.popup-actions{display:flex;gap:8px}
.popup-btn-primary{flex:1;padding:11px;background:var(--red);color:#fff;border:none;font-size:11px;font-weight:800;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;transition:background .15s}
.popup-btn-primary:hover{background:#a3001a}
.popup-btn-secondary{padding:11px 16px;background:none;color:var(--ink4);border:1.5px solid var(--bdr2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.popup-btn-secondary:hover{border-color:var(--ink);color:var(--ink)}
.popup-timer-bar{height:3px;background:var(--bdr);margin-top:12px;overflow:hidden}
.popup-timer-fill{height:100%;background:var(--red);width:100%;transition:width linear}
#floatAd{position:fixed;bottom:0;left:0;right:0;z-index:3000;background:#fff;border-top:2px solid var(--red);box-shadow:0 -4px 20px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:space-between;padding:8px 20px;transform:translateY(100%);transition:transform .4s cubic-bezier(.4,0,.2,1)}
#floatAd.show{transform:translateY(0)}
#floatAd .fa-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--ink4);padding:4px 8px;flex-shrink:0;line-height:1}
#floatAd .fa-close:hover{color:var(--red)}
#floatAd .fa-label{font-size:7.5px;color:var(--ink5);letter-spacing:.1em;text-transform:uppercase;display:block;text-align:center;margin-bottom:4px}
.shuffle-badge{display:inline-flex;align-items:center;gap:5px;font-size:8.5px;font-weight:700;color:var(--ink4);letter-spacing:.06em;padding:0 0 5px 0;margin-left:auto;margin-right:8px}
.shuffle-dot{width:5px;height:5px;background:#4ade80;border-radius:50%;animation:blink 2s ease infinite;flex-shrink:0}
.shuffle-countdown{color:var(--red);font-variant-numeric:tabular-nums}
.cat-empty{padding:60px 20px;text-align:center;font-family:'Outfit',sans-serif}
.cat-empty-icon{font-size:48px;margin-bottom:16px}
.cat-empty-msg{font-size:14px;color:var(--ink4)}
@media(max-width:900px){
  .main-layout,.article-layout,.cat-layout{grid-template-columns:1fr;gap:16px}
  .sidebar{display:flex;flex-direction:column;gap:14px}
  .sb-ad{display:none}
  .pub-grid,.feat-grid,.cat-featured{grid-template-columns:1fr}
  .pub-left,.feat-left,.cat-feat-left{border-right:none;border-bottom:1px solid var(--bdr);padding-right:0;padding-bottom:14px;margin-bottom:14px}
  .pub-right,.feat-right{padding-left:0}
  .pop-grid{grid-template-columns:1fr 1fr}
  .video-grid-4{grid-template-columns:1fr 1fr}
  .tri-grid,.more-sec{grid-template-columns:1fr !important}
  .tri-col,.more-col{border-right:none;border-bottom:1px solid var(--bdr)}
  .related-grid{grid-template-columns:1fr 1fr}
  .form-row{grid-template-columns:1fr}
  .stat-row{grid-template-columns:1fr 1fr}
  .mn-links{display:none}
  .hamburger{display:flex}
  .article-headline{font-size:26px}
  .article-hero-img{height:240px}
  .pub-big-title{font-size:20px}
  .pub-big-img{height:160px}
  .prt-img{height:110px}
  .tu-links{display:none}
  .tu-ed{display:none}
  .cat-header-name{font-size:28px}
}
@media(max-width:600px){

  .toputil{display:none}
  .mh-left,.mh-right{display:none}
  .mh-in{justify-content:center;padding:0 16px}
  .mh-center{flex:1;text-align:center}
  .masthead{padding:8px 0}
  .mh-center svg{height:36px !important;width:auto !important}
  .mn-in{padding:0 12px;height:44px}
  .hamburger{padding:8px}
  .page,.article-page,.cat-page,.static-page{padding:0 12px}
  .tr-label{padding:0 10px;font-size:7px}
  .tr-track a{font-size:10px}
  .pop-grid{grid-template-columns:1fr 1fr}
  .pop-img{height:90px}
  .pop-title{font-size:12px;-webkit-line-clamp:2}
  .video-grid-4{grid-template-columns:1fr 1fr}
  .vg-img{height:80px}
  .vg-title{font-size:10px}
  .tri-grid,.more-sec{grid-template-columns:1fr !important}
  .tri-col,.more-col{border-right:none;border-bottom:1px solid var(--bdr)}
  .article-headline{font-size:22px;line-height:1.2}
  .article-dek{font-size:14px}
  .article-hero-img{height:200px}
  .article-body{font-size:14px}
  .article-body p{margin-bottom:16px}
  .article-meta-bar{flex-wrap:wrap;gap:6px;font-size:9.5px}
  .article-share{margin-left:0;width:100%;justify-content:flex-start}
  .related-grid{grid-template-columns:1fr}
  .rel-card-img{height:130px}
  .cat-header-name{font-size:24px}
  .cat-feat-img{height:180px}
  .cat-feat-title{font-size:18px}
  .cat-grid{grid-template-columns:1fr 1fr}
  .cgi-img{height:90px}
  .cgi-title{font-size:12px}
  .static-hero{padding:28px 20px}
  .static-hero-title{font-size:30px}
  .stat-row{grid-template-columns:1fr 1fr}
  .stat-num{font-size:32px}
  .ft-top{flex-direction:column;gap:14px}
  .ft-bottom{flex-direction:column;align-items:flex-start;gap:6px}
  #backToTop{bottom:14px;right:14px;width:34px;height:34px;font-size:14px}
  .rasi-slider{height:180px}
  .rasi-slide{height:180px}
  .mh-center{flex:1;display:flex;justify-content:center}
  .mh-center > div{display:none !important}
  .mob-logo{display:flex !important}
  .tr-label::after{display:none}
  .share-btn{padding:4px 8px;font-size:9px}
  .mob-menu a{padding:12px 20px;font-size:14px}
  .tag,.article-tag{font-size:9px;padding:3px 8px}
  #floatAd{padding:8px 12px}
  .ad-incontent{height:200px;flex-direction:column;gap:10px}
}
@media(max-width:380px){
  .pop-grid,.cat-grid{grid-template-columns:1fr}
  .video-grid-4{grid-template-columns:1fr}
  .article-headline{font-size:20px}
  .pub-big-title{font-size:16px}
}

window.downloadImageWithWatermark=function(imgEl,filename){

// AD ENGINE — ads-admin.html నుండి localStorage లో save అయిన
// ads ని dynamically load చేస్తుంది
// ═══════════════════════════════════════════════════════════════
const ADS_STORAGE_KEY = 'selectme_ads_v2';
const ADS_SETTINGS_KEY = 'selectme_ads_settings';

// localStorage నుండి active ads load చేయడం
function _loadAds() {
  try { return JSON.parse(localStorage.getItem(ADS_STORAGE_KEY)) || []; } catch { return []; }
}
function _loadAdSettings() {
  const defaults = {
    master_enabled:true, popup_enabled:true, float_enabled:true,
    sidebar_enabled:true, home_ads:true, article_ads:true,
    category_ads:true, static_ads:true, popup_delay:5, float_delay:8
  };
  try { return { ...defaults, ...JSON.parse(localStorage.getItem(ADS_SETTINGS_KEY)) }; }
  catch { return defaults; }
}

// Type → slot name mapping
function _adByType(type, page) {
  const s = _loadAdSettings();
  if (!s.master_enabled) return null;
  if (page === 'home' && !s.home_ads) return null;
  if (page === 'article' && !s.article_ads) return null;
  if (page === 'category' && !s.category_ads) return null;
  if (page === 'static' && !s.static_ads) return null;
  const ads = _loadAds();
  return ads.find(a => a.type === type && a.status === 'active' && (!page || !a.pages || a.pages.includes(page))) || null;
}

// Single ad HTML builder — same logic as ads-admin.html
function _buildAdHtml(ad) {
  if (!ad) return '';
  if (ad.customhtml && ad.customhtml.trim()) return ad.customhtml;
  const bg = ad.bg || 'linear-gradient(90deg,#131921,#232f3e)';
  const url = ad.url || '#';
  const emoji = ad.emoji || '📢';
  const hl = (ad.headline||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const sub = (ad.subtext||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const cta = (ad.cta||'Learn More').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  if (ad.type === 'banner' || ad.type === 'midstrip') {
    return `<div class="ad-wrap" style="margin:14px 0"><div class="ad-label">Advertisement</div><div style="width:100%;height:90px;background:${bg};display:flex;align-items:center;justify-content:space-between;padding:0 24px;cursor:pointer;overflow:hidden" onclick="window.open('${url}','_blank')"><div style="display:flex;align-items:center;gap:14px"><div style="font-size:26px">${emoji}</div><div><div style="color:#fff;font-size:14px;font-weight:700">${hl}</div><div style="color:rgba(255,255,255,.5);font-size:10px;margin-top:3px">${sub}</div></div></div><div style="background:#ff9900;color:#111;font-size:11px;font-weight:900;padding:9px 20px;white-space:nowrap;flex-shrink:0">${cta}</div></div></div>`;
  }
  if (ad.type === 'leaderboard') {
    return `<div class="ad-wrap" style="margin:0 0 16px"><div class="ad-label">Advertisement</div><div style="width:100%;height:80px;background:${bg};display:flex;align-items:center;justify-content:space-between;padding:0 24px;cursor:pointer;border:1px solid #2a1a1a" onclick="window.open('${url}','_blank')"><div style="display:flex;align-items:center;gap:14px"><div style="width:44px;height:44px;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${emoji}</div><div><div style="color:#fff;font-size:13px;font-weight:700">${hl}</div><div style="color:rgba(255,255,255,.4);font-size:9px;margin-top:2px">${sub}</div></div></div><div style="background:var(--red);color:#fff;font-size:10px;font-weight:800;padding:8px 18px;white-space:nowrap;flex-shrink:0">${cta}</div></div></div>`;
  }
  if (ad.type === 'incontent') {
    return `<div class="ad-wrap" style="margin:28px 0"><div class="ad-label">Advertisement</div><div style="width:100%;height:220px;background:${bg};display:flex;align-items:center;justify-content:center;gap:24px;cursor:pointer;padding:0 24px" onclick="window.open('${url}','_blank')"><div style="text-align:center;flex-shrink:0"><div style="font-size:36px;margin-bottom:4px">${emoji}</div><div style="color:rgba(255,255,255,.4);font-size:9px;text-transform:uppercase;letter-spacing:.1em">Sponsored</div></div><div style="color:#fff"><div style="font-size:20px;font-weight:700;line-height:1.2;margin-bottom:8px">${hl}</div><div style="font-size:11px;color:rgba(255,255,255,.55);line-height:1.6;margin-bottom:12px">${sub}</div><div style="display:inline-block;background:#ff9900;color:#111;font-size:10px;font-weight:800;padding:8px 20px;text-transform:uppercase;letter-spacing:.08em">${cta}</div></div></div></div>`;
  }
  if (ad.type === 'sidebar') {
    return `<div class="sb-ad"><div style="width:100%;height:280px;background:${bg};display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer" onclick="window.open('${url}','_blank')"><div style="font-size:28px">${emoji}</div><div style="color:#fff;font-size:16px;font-weight:900;text-align:center;padding:0 16px;line-height:1.3;font-family:'Playfair Display',serif">${hl}</div><div style="color:rgba(255,255,255,.7);font-size:12px;font-style:italic">${sub}</div><div style="background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:8px 22px;text-transform:uppercase;cursor:pointer">${cta}</div></div><div class="al">Advertisement</div></div>`;
  }
  // floatbar / popup handled separately
  return '';
}

// Helper: article body లో Nth </p> తర్వాత ad inject చేయడం

const SHEET_ID='11YH8j5qp2FRqDmpa6vEN0g53U3CFkPIrLNqjRRu0Rjk';
const SHEET_GID='568663683';
let NAV_STRUCTURE=[];

async function loadNavFromSheet(){
  const csvUrl=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${SHEET_GID}`;
  try{const res=await fetch(csvUrl);if(!res.ok)throw new Error('Sheet fetch failed: '+res.status);const text=await res.text();parseSheetNav(text);return true;}
  catch(e){console.warn('[Nav] Sheet load failed:',e.message);buildNavFromArticles();return false;}
}
function parseSheetNav(csvText){
  const lines=csvText.trim().split('\n');if(!lines.length)return;
  const cols=[];
  lines.forEach((line,rowIdx)=>{
    const cells=parseCSVLine(line);
    cells.forEach((cell,colIdx)=>{
      const val=cell.trim();if(!val)return;
      if(!cols[colIdx])cols[colIdx]={label:'',subs:[]};
      if(rowIdx===0){cols[colIdx].label=val;cols[colIdx].key=val.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');}
      else{cols[colIdx].subs.push({label:val,key:val.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_\u0c00-\u0c7f]/g,'')||val});}
    });
  });
  NAV_STRUCTURE=cols.filter(c=>c.label);
}
function parseCSVLine(line){
  const result=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(ch===','&&!inQ){result.push(cur);cur='';}else{cur+=ch;}}
  result.push(cur);return result;
}
function buildNavFromArticles(){
  const seen=new Set();NAV_STRUCTURE=[];
  Object.values(ARTICLES).forEach(a=>{if(!seen.has(a.cat)){seen.add(a.cat);const label=(CATEGORIES[a.cat]&&CATEGORIES[a.cat].label)?CATEGORIES[a.cat].label:(a.catLabel||a.cat);NAV_STRUCTURE.push({key:a.cat,label,subs:[]});}});
}

const MAX_VISIBLE_NAV=6;
function buildDynamicNav(){
  const mnLinks=document.getElementById('mnLinks');
  const homeBtn=mnLinks.querySelector('#navHome');
  const loadingEl=mnLinks.querySelector('#navLoading');
  Array.from(mnLinks.children).forEach(el=>{if(el!==homeBtn)el.remove();});
  if(loadingEl)loadingEl.remove();
  const hasArticles=(key)=>Object.values(ARTICLES).some(a=>a.cat===key||(NAV_STRUCTURE.find(n=>n.key===key)?.subs||[]).some(s=>s.key===a.cat));
  const filteredNav=NAV_STRUCTURE.filter(n=>hasArticles(n.key));
  const visible=filteredNav.slice(0,MAX_VISIBLE_NAV);
  const overflow=filteredNav.slice(MAX_VISIBLE_NAV);
  visible.forEach(navItem=>{mnLinks.appendChild(createNavItem(navItem));});
  if(overflow.length>0){
    const more=document.createElement('div');more.className='mn-more';more.id='mnMore';
    const btn=document.createElement('button');btn.className='mn-more-btn';btn.innerHTML='More <span class="arr">▼</span>';
    btn.onclick=(e)=>{e.stopPropagation();more.classList.toggle('open');};
    const drop=document.createElement('div');drop.className='mn-dropdown';
    overflow.forEach(navItem=>{
      const a=document.createElement('a');a.id='nav_'+navItem.key;a.textContent=navItem.label;a.onclick=()=>{goCategory(navItem.key);more.classList.remove('open');};drop.appendChild(a);
    });
    more.appendChild(btn);more.appendChild(drop);mnLinks.appendChild(more);
    document.addEventListener('click',()=>more.classList.remove('open'));
  }
  buildMobileMenu();
}
function createNavItem(navItem){
  if(!navItem.subs||navItem.subs.length===0){
    const a=document.createElement('a');a.id='nav_'+navItem.key;a.textContent=navItem.label;a.onclick=()=>goCategory(navItem.key);return a;
  }
  const wrapper=document.createElement('div');wrapper.className='nav-item';wrapper.id='navitem_'+navItem.key;
  const btn=document.createElement('button');btn.className='nav-item-btn';btn.id='nav_'+navItem.key;btn.innerHTML=navItem.label;btn.onclick=()=>{goCategory(navItem.key);};
  const submenu=document.createElement('div');submenu.className='nav-submenu';
  const allItem=document.createElement('div');allItem.className='nav-submenu-item all-item';allItem.textContent='All '+navItem.label;allItem.onclick=()=>{goCategory(navItem.key);wrapper.classList.remove('open');};submenu.appendChild(allItem);
  navItem.subs.forEach(sub=>{
    const item=document.createElement('div');item.className='nav-submenu-item';item.setAttribute('data-subkey',sub.key||navItem.key);item.textContent=sub.label;
    item.onclick=(e)=>{e.stopPropagation();document.querySelectorAll('.nav-submenu-item').forEach(el=>el.classList.remove('active-sub'));item.classList.add('active-sub');wrapper.classList.remove('open');goSubCategory(sub.key||navItem.key,navItem.key);};
    submenu.appendChild(item);
  });
  wrapper.appendChild(btn);wrapper.appendChild(submenu);return wrapper;
}
function buildMobileMenu(){
  const mobMenu=document.getElementById('mobMenu');
  Array.from(mobMenu.querySelectorAll('[data-dynamic]')).forEach(el=>el.remove());
  const hasArticles=(key)=>Object.values(ARTICLES).some(a=>a.cat===key||(NAV_STRUCTURE.find(n=>n.key===key)?.subs||[]).some(s=>s.key===a.cat));
  NAV_STRUCTURE.filter(n=>hasArticles(n.key)).forEach(navItem=>{
    const hd=document.createElement('div');hd.className='mob-cat-hd';hd.setAttribute('data-dynamic','1');hd.textContent=navItem.label;hd.onclick=()=>{goCategory(navItem.key);toggleMenu();};mobMenu.appendChild(hd);
  });
  ['about','contact','subscribe'].forEach(p=>{
    const a=document.createElement('a');a.setAttribute('data-dynamic','1');a.textContent=p.charAt(0).toUpperCase()+p.slice(1);a.onclick=()=>{goPage(p);toggleMenu();};mobMenu.appendChild(a);
  });
}

function normalizeArticle(raw){
  if(!raw||!raw.id)return null;
  const bc=raw.blog_content||{};
  let bodyTe='',bodyEn='';
  if(typeof bc==='string'){bodyTe=bc;}
  else if(typeof bc==='object'){bodyTe=bc.telugu||'';bodyEn=bc.english||'';}
  function toHtml(text){if(!text)return '';if(/<[a-z][\s\S]*>/i.test(text))return text;return text.split(/\n\s*\n/).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).filter(p=>p!=='<p></p>').join('');}
  bodyTe=toHtml(bodyTe);bodyEn=toHtml(bodyEn);
  const body=bodyTe||bodyEn;
  const seo=raw.seo||{};
  const rawCat=(raw.category||'news').toString().trim().toLowerCase().replace(/\s+/g,'_');
  return{
    id:raw.id,cat:rawCat,catLabel:raw.category_label||raw.category||'News',
    title:raw.telugu_title||raw.english_title||raw.title||'Untitled',
    titleEn:raw.english_title||raw.title||raw.telugu_title||'',
    dek:raw.telugu_excerpt||raw.excerpt||'',
    author:raw.author||'Selectme Editorial',date:raw.published_date||raw.date||'',
    readTime:raw.read_time||'5 min read',
    img:(raw.media&&raw.media.featured_image)?raw.media.featured_image:`https://picsum.photos/seed/${raw.id}/900/500`,
    tags:Array.isArray(raw.tags)?raw.tags:(typeof raw.tags==='string'&&raw.tags.trim()?raw.tags.split(',').map(t=>t.trim()).filter(Boolean):[]),
    imgAlt:(function(){
      if(raw.media&&raw.media.featured_image_alt&&raw.media.featured_image_alt.trim())return raw.media.featured_image_alt.trim();
      var ytTags=raw.youtube_metadata&&Array.isArray(raw.youtube_metadata.tags)&&raw.youtube_metadata.tags.length?raw.youtube_metadata.tags.join(', '):'';
      if(ytTags)return ytTags;
      return raw.telugu_title||raw.english_title||raw.title||'';
    })(),
    imgCap:(raw.media&&raw.media.featured_image_caption&&raw.media.featured_image_caption.trim())?raw.media.featured_image_caption.trim():'',
    body,bodyTe,bodyEn,
    seoTitle:seo.title||seo.meta_title||(raw.youtube_metadata&&raw.youtube_metadata.title?raw.youtube_metadata.title:'')||raw.telugu_title||raw.english_title||'',
    seoDescription:seo.description||seo.meta_description||raw.telugu_excerpt||raw.excerpt||'',
    seoKeywords:(function(){
      var k1=Array.isArray(seo.keywords)?seo.keywords:(typeof seo.keywords==='string'&&seo.keywords.trim()?seo.keywords.split(',').map(function(s){return s.trim();}).filter(Boolean):[]);
      var k2=raw.youtube_metadata&&Array.isArray(raw.youtube_metadata.tags)?raw.youtube_metadata.tags:[];
      var merged=[...new Set([...k1,...k2])];
      return merged.join(', ');
    })(),
    related:raw.related_articles||[]
  };
}

const LOADED_CATS=new Set();

function buildTrendingBar(){
  const track=document.getElementById('trendingTrack');
  const arts=Object.values(ARTICLES);if(!arts.length||!track)return;
  const shuffled=[...arts].sort(()=>Math.random()-.5);
  track.innerHTML=[...shuffled,...shuffled].map(a=>`<a onclick="goArticle('${a.cat}','${a.id}')">${a.title}</a>`).join('');
}

function showPage(which){
  ['pageHome','pageArticle','pageCategory','pageStatic'].forEach(id=>{document.getElementById(id).style.display='none';});
  const el=document.getElementById(which);el.style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
  el.classList.remove('page-view');void el.offsetWidth;el.classList.add('page-view');
}

function setActiveNav(key){
  document.querySelectorAll('.nav-item-btn,.mn-links > a').forEach(a=>a.classList.remove('active-nav'));
  if(key){const el=document.getElementById('nav_'+key);if(el)el.classList.add('active-nav');}
}

function goHome(){_isOnHomePage=true;saveState('home');buildHomePage();showPage('pageHome');setActiveNav('navHome');}
function goArticle(cat,id){_isOnHomePage=false;saveState('article',cat+':'+id);renderArticle(id);showPage('pageArticle');setActiveNav('');}

function goSubCategory(subKey,parentKey){
  _isOnHomePage=false;saveState('subcategory',parentKey+':'+subKey);setActiveNav(parentKey);
  document.querySelectorAll('.nav-submenu-item').forEach(el=>el.classList.remove('active-sub'));
  const activeItem=document.querySelector('.nav-submenu-item[data-subkey="'+subKey+'"]');
  if(activeItem)activeItem.classList.add('active-sub');
  const subData=findCatData(subKey);const parentData=findCatData(parentKey);
  const navItem=NAV_STRUCTURE.find(n=>n.key===parentKey);
  var subFilterHtml='';
  if(navItem&&navItem.subs&&navItem.subs.length>0){
    subFilterHtml='<div class="cat-subfilter"><button class="cat-sub-btn" onclick="goCategory(\''+parentKey+'\')">All '+(parentData.label||parentKey)+'</button>'+navItem.subs.map(s=>'<button class="cat-sub-btn'+(s.key===subKey?' active':'')+'" onclick="goSubCategory(\''+s.key+'\',\''+parentKey+'\')">'+s.label+'</button>').join('')+'</div>';
  }
  if(!LOADED_CATS.has(subKey)){
    document.getElementById('pageCategory').innerHTML='<div class="cat-page page-view">'+AD.leaderboard()+'<div class="cat-header"><div class="cat-header-icon">'+(subData.icon||parentData.icon||'📂')+'</div><div><div class="cat-header-name">'+(subData.label||subKey)+'</div><div style="font-size:11px;color:var(--ink4);margin-top:3px">in '+(parentData.label||parentKey)+'</div></div></div>'+subFilterHtml+'<div style="display:flex;align-items:center;justify-content:center;height:40vh"><div style="text-align:center"><div class="loader"></div><p style="margin-top:14px;font-size:12px;color:#888;font-family:Outfit,sans-serif">Loading articles…</p></div></div></div>';
    showPage('pageCategory');
    loadCategoryArticles(subKey).then(()=>{_renderSubCat(subKey,parentKey,subFilterHtml,subData,parentData);});
    return;
  }
  _renderSubCat(subKey,parentKey,subFilterHtml,subData,parentData);showPage('pageCategory');
}

function _renderSubCat(subKey,parentKey,subFilterHtml,subData,parentData){
  var artIds=Object.values(ARTICLES).filter(function(a){return a.cat===subKey;}).map(function(a){return a.id;});
  if(!artIds.length){
    document.getElementById('pageCategory').innerHTML='<div class="cat-page page-view">'+AD.leaderboard()+'<div class="cat-header"><div class="cat-header-icon">'+(subData.icon||parentData.icon||'📂')+'</div><div><div class="cat-header-name">'+(subData.label||subKey)+'</div><div style="font-size:11px;color:var(--ink4);margin-top:3px">in '+(parentData.label||parentKey)+'</div></div></div>'+subFilterHtml+'<div class="cat-empty"><div class="cat-empty-icon">📭</div><div class="cat-empty-msg">ఈ category లో ఇంకా articles లేవు.</div></div></div>';
    showPage('pageCategory');return;
  }
  var feat=ARTICLES[artIds[0]];
  var subItems=artIds.slice(1,4).map(function(id){var a=ARTICLES[id];if(!a)return '';return '<div class="cat-feat-item" onclick="goArticle(\''+a.cat+'\',\''+a.id+'\')"><div><div class="cfi-title">'+a.title+'</div><div class="cfi-meta">'+a.author+' · '+a.date+'</div></div><div class="rwrap rwrap-cfi-img"><img src="'+a.img+'" alt="'+a.imgAlt+'" class="cfi-img"/></div></div>';}).join('');
  const gridItems=artIds.map(function(id){var a=ARTICLES[id];if(!a)return '';return '<div class="cat-grid-item" onclick="goArticle(\''+a.cat+'\',\''+a.id+'\')"><div class="rwrap rwrap-cgi-img"><img src="'+a.img+'" alt="'+a.imgAlt+'" class="cgi-img"/></div><div class="cgi-title">'+a.title+'</div><div class="cgi-meta">'+a.author+' · '+a.date+'</div></div>';});
  if(gridItems.length>6)gridItems.splice(6,0,'<div style="grid-column:1/-1">'+AD.midStrip()+'</div>');
  const grid=gridItems.join('');
  document.getElementById('pageCategory').innerHTML='<div class="cat-page page-view">'+AD.leaderboard()+'<div class="cat-header"><div class="cat-header-icon">'+(subData.icon||parentData.icon||'📂')+'</div><div><div class="cat-header-name">'+(subData.label||subKey)+'</div><div style="font-size:11px;color:var(--ink4);margin-top:3px">in '+(parentData.label||parentKey)+'</div></div><div class="cat-header-count">'+artIds.length+' stories</div></div>'+subFilterHtml+AD.banner()+'<div class="cat-layout"><div class="cat-main"><div class="cat-featured"><div class="cat-feat-left" onclick="goArticle(\''+feat.cat+'\',\''+feat.id+'\')"><div class="rwrap rwrap-cat-feat-img"><img src="'+feat.img+'" alt="'+feat.imgAlt+'" class="cat-feat-img"/></div><div class="cat-feat-title">'+feat.title+'</div><div class="cat-feat-dek">'+feat.dek+'</div><div class="cat-feat-meta">'+feat.author+' · '+feat.date+'</div></div><div class="cat-feat-right">'+subItems+'</div></div>'+AD.midStrip()+'<div class="cat-grid">'+grid+'</div>'+AD.banner()+'</div><div class="sidebar">'+AD.sidebarBox()+buildSidebar()+'</div></div></div>';
  showPage('pageCategory');
}

async function goCategory(cat){
  _isOnHomePage=false;saveState('category',cat);setActiveNav(cat);
  document.querySelectorAll('.nav-submenu-item').forEach(el=>el.classList.remove('active-sub'));
  // Check cat + all its sub-cats are loaded
  const _navItem=NAV_STRUCTURE.find(n=>n.key===cat);
  const _subKeys=(_navItem&&_navItem.subs)?_navItem.subs.map(s=>s.key):[];
  const _allLoaded=LOADED_CATS.has(cat)&&_subKeys.every(k=>LOADED_CATS.has(k));
  if(_allLoaded){renderCategory(cat);showPage('pageCategory');return;}
  const catData=findCatData(cat);
  document.getElementById('pageCategory').innerHTML=`<div class="cat-page page-view">${AD.leaderboard()}<div class="cat-header"><div class="cat-header-icon">${catData.icon||'📂'}</div><div class="cat-header-name">${catData.label||cat}</div></div><div style="display:flex;align-items:center;justify-content:center;height:40vh"><div style="text-align:center"><div class="loader"></div><p style="margin-top:14px;font-size:12px;color:#888;font-family:'Outfit',sans-serif">${catData.label||cat} articles load అవుతున్నాయి…</p></div></div></div>`;
  showPage('pageCategory');
  await loadCategoryArticles(cat);renderCategory(cat);
}

function findCatData(cat){
  if(CATEGORIES[cat])return CATEGORIES[cat];
  for(const n of NAV_STRUCTURE){if(n.key===cat)return{icon:'📂',label:n.label};if(n.subs){const s=n.subs.find(s=>s.key===cat);if(s)return{icon:'📂',label:s.label};}}
  return{icon:'📂',label:cat};
}

function goPage(page){_isOnHomePage=false;saveState('page',page);renderStaticPage(page);showPage('pageStatic');setActiveNav('');}
function doSearch(){const q=document.getElementById('searchInput').value.trim();if(q)goCategory('news');}

function renderCategory(cat,activeSub){
  // Special handling: 'video' category shows RSS video grid
  if(cat==='video'){_renderVideoCategory();return;}
  let navItem=NAV_STRUCTURE.find(n=>n.key===cat);
  if(!navItem){for(const n of NAV_STRUCTURE){if(n.subs&&n.subs.find(s=>s.key===cat)){navItem=n;break;}}}
  const catData=findCatData(cat);
  let artIds=Object.values(ARTICLES).filter(a=>{
    if(activeSub)return a.cat===activeSub;
    const subKeys=(navItem&&navItem.subs)?navItem.subs.map(s=>s.key):[];
    return a.cat===cat||subKeys.includes(a.cat)||a.cat.startsWith(cat+'_')||a.cat.endsWith('_'+cat);
  }).map(a=>a.id);
  const subFilterHtml=(navItem&&navItem.subs&&navItem.subs.length>0)?(()=>{const activeSubs=navItem.subs.filter(s=>Object.values(ARTICLES).some(a=>a.cat===s.key));return activeSubs.length>0?`<div class="cat-subfilter"><button class="cat-sub-btn${!activeSub?' active':''}" onclick="goCategory('${cat}')">All ${catData.label}</button>${activeSubs.map(s=>`<button class="cat-sub-btn${activeSub===s.key?' active':''}" onclick="goSubCategory('${s.key}','${cat}')">${s.label}</button>`).join('')}</div>`:''})():'';
  if(!artIds.length){document.getElementById('pageCategory').innerHTML=`<div class="cat-page page-view">${AD.leaderboard()}<div class="cat-header"><div class="cat-header-icon">${catData.icon||'📂'}</div><div class="cat-header-name">${catData.label||cat}</div></div>${subFilterHtml}<div class="cat-empty"><div class="cat-empty-icon">📭</div><div class="cat-empty-msg">ఈ category లో ఇంకా articles లేవు.</div></div></div>`;return;}
  const feat=ARTICLES[artIds[0]];
  const sub=artIds.slice(1,4).map(id=>{const a=ARTICLES[id];if(!a)return '';return `<div class="cat-feat-item" onclick="goArticle('${a.cat}','${a.id}')"><div><div class="cfi-title">${a.title}</div><div class="cfi-meta">${a.author} · ${a.date}</div></div><div class="rwrap rwrap-cfi-img"><img src="${a.img}" alt="${a.imgAlt}" class="cfi-img"/></div></div>`;}).join('');
  const gridItems=artIds.map(id=>{const a=ARTICLES[id];if(!a)return '';return `<div class="cat-grid-item" onclick="goArticle('${a.cat}','${a.id}')"><div class="rwrap rwrap-cgi-img"><img src="${a.img}" alt="${a.imgAlt}" class="cgi-img"/></div><div class="cgi-title">${a.title}</div><div class="cgi-meta">${a.author} · ${a.date}</div></div>`;});
  if(gridItems.length>6)gridItems.splice(6,0,`<div style="grid-column:1/-1">${AD.midStrip()}</div>`);
  const grid=gridItems.join('');
  document.getElementById('pageCategory').innerHTML=`<div class="cat-page page-view">${AD.leaderboard()}<div class="cat-header"><div class="cat-header-icon">${catData.icon||'📂'}</div><div class="cat-header-name">${catData.label||cat}</div><div class="cat-header-count">${artIds.length} stories</div></div>${subFilterHtml}${AD.banner()}<div class="cat-layout"><div class="cat-main"><div class="cat-featured"><div class="cat-feat-left" onclick="goArticle('${feat.cat}','${feat.id}')"><div class="rwrap rwrap-cat-feat-img"><img src="${feat.img}" alt="${feat.imgAlt}" class="cat-feat-img"/></div><div class="cat-feat-title">${feat.title}</div><div class="cat-feat-dek">${feat.dek}</div><div class="cat-feat-meta">${feat.author} · ${feat.date}</div></div><div class="cat-feat-right">${sub}</div></div>${AD.midStrip()}<div class="cat-grid">${grid}</div>${AD.banner()}</div><div class="sidebar">${AD.sidebarBox()}${buildSidebar()}</div></div></div>`;
}

function _renderVideoCategory(){
  const catData=CATEGORIES['video']||{icon:'▶',label:'Video'};
  const artVideoIds=Object.values(ARTICLES).filter(a=>a.cat==='video').map(a=>a.id);
  // Build video grid from RSS cache + article videos
  function _buildVideoCatGrid(rssItems){
    var cards='';
    if(rssItems&&rssItems.length){
      cards=rssItems.map(function(v){
        var thumb=v.thumb||('https://picsum.photos/seed/'+encodeURIComponent(v.title.substring(0,8))+'/480/270');
        var onclick=v.videoId?"window.open('https://www.youtube.com/watch?v="+v.videoId+"','_blank')"
          :"window.open('"+v.link.replace(/'/g,"\\'")+"','_blank')";
        return '<div class="cat-grid-item" style="cursor:pointer" onclick="'+onclick+'">'+
          '<div class="rwrap rwrap-cgi-img"><img src="'+thumb+'" alt="'+v.title.replace(/"/g,'&quot;')+'" onerror="this.src=\'https://picsum.photos/seed/vid/480/270\'" class="cgi-img"/>'+
          '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none"><div style="width:32px;height:32px;background:rgba(255,255,255,.85);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;padding-left:2px">▶</div></div></div>'+
          '<div class="cgi-title">'+v.title+'</div>'+
          '<div class="cgi-meta">'+v.source+' · '+v.date+'</div></div>';
      }).join('');
    }
    // Also append article-based videos
    if(artVideoIds.length){
      cards+=artVideoIds.map(function(id){var a=ARTICLES[id];if(!a)return '';
        return '<div class="cat-grid-item" onclick="goArticle(\''+a.cat+'\',\''+a.id+'\')">'+
          '<div class="rwrap rwrap-cgi-img" style="position:relative"><img src="'+a.img+'" alt="'+a.imgAlt+'" class="cgi-img"/>'+
          '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none"><div style="width:32px;height:32px;background:rgba(255,255,255,.85);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;padding-left:2px">▶</div></div></div>'+
          '<div class="cgi-title">'+a.title+'</div><div class="cgi-meta">'+a.author+' · '+a.date+'</div></div>';
      }).join('');
    }
    return cards||'<div style="grid-column:1/-1;padding:28px;text-align:center;color:#888">Videos ఇంకా load అవుతున్నాయి…</div>';
  }
  var totalCount=((_rssVideoCache&&_rssVideoCache.length)||0)+artVideoIds.length;
  document.getElementById('pageCategory').innerHTML=
    '<div class="cat-page page-view">'+AD.leaderboard()+
    '<div class="cat-header"><div class="cat-header-icon">▶</div>'+
    '<div class="cat-header-name">'+(catData.label||'Video')+'</div>'+
    (totalCount?'<div class="cat-header-count">'+totalCount+' videos</div>':'')+
    '</div>'+AD.banner()+
    '<div class="cat-layout"><div class="cat-main">'+
    '<div class="cat-grid" id="videoCatGrid" style="border:1px solid var(--bdr)">'+
      _buildVideoCatGrid(_rssVideoCache)+
    '</div>'+AD.midStrip()+'</div>'+
    '<div class="sidebar">'+AD.sidebarBox()+buildSidebar()+'</div></div></div>';
  // If no RSS cache yet, trigger load and refresh grid when done
  if(!_rssVideoCache&&_getRssFeeds().length){
    loadRssVideos().then(function(){
      var g=document.getElementById('videoCatGrid');
      if(g)g.innerHTML=_buildVideoCatGrid(_rssVideoCache);
    });
  }
}

function renderArticle(id){
  const art=ARTICLES[id];if(!art)return;
  if(art.seoTitle)document.title=art.seoTitle;
  setMeta('description',art.seoDescription);setMeta('keywords',art.seoKeywords);
  setMeta('og:type','article',true);setMeta('og:title',art.seoTitle||art.title,true);
  setMeta('og:description',art.seoDescription,true);setMeta('og:image',art.img,true);
  setMeta('og:url',location.href,true);setMeta('og:site_name','Selectme.in',true);
  setMeta('twitter:card','summary_large_image');setMeta('twitter:title',art.seoTitle||art.title);
  setMeta('twitter:description',art.seoDescription);setMeta('twitter:image',art.img);
  setCanonical(location.href);
  let relatedIds=(art.related||[]).filter(rid=>ARTICLES[rid]&&rid!==art.id);
  if(relatedIds.length<3){const sameCat=Object.values(ARTICLES).filter(a=>a.cat===art.cat&&a.id!==art.id&&!relatedIds.includes(a.id));relatedIds=[...relatedIds,...sameCat.map(a=>a.id)].slice(0,3);}
  if(relatedIds.length<3){const others=Object.values(ARTICLES).filter(a=>a.id!==art.id&&!relatedIds.includes(a.id));relatedIds=[...relatedIds,...others.map(a=>a.id)].slice(0,3);}
  const related=relatedIds.map(rid=>{const r=ARTICLES[rid];if(!r)return '';return `<div class="rel-card" onclick="goArticle('${r.cat}','${r.id}')"><div class="rwrap rwrap-rel-card-img"><img src="${r.img}" alt="${r.imgAlt}" class="rel-card-img"/></div><div class="rel-card-cat">${r.catLabel}</div><div class="rel-card-title">${r.title}</div><div class="rel-card-meta">${r.author} · ${r.date}</div></div>`;}).join('');
  const tagsHtml=art.tags.length?`<div class="article-tags"><span class="tags-label">🏷️ Tags:</span>${art.tags.map(t=>`<span class="article-tag" onclick="goCategory('news')">${t}</span>`).join('')}</div>`:'';

  // Body with in-content ad injected after 3rd paragraph
  let bodyHtml='';
  if(art.bodyTe&&art.bodyEn){

    bodyHtml=`<div class="lang-tabs"><button class="lang-tab active" onclick="switchLang(this,'body-te','body-en')">తెలుగు</button><button class="lang-tab" onclick="switchLang(this,'body-en','body-te')">English</button></div><div id="body-te" class="article-body">${injTe}</div><div id="body-en" class="article-body" style="display:none">${injEn}</div>`;
  } else {
    bodyHtml=`<div class="article-body">${injectAdAfterParagraph(art.body,3,AD.inContent())}</div>`;
  }

  document.getElementById('pageArticle').innerHTML=`<div class="article-page page-view">
    ${AD.banner()}
    <div class="article-layout">
      <div class="article-main">
        <div class="article-breadcrumb"><a onclick="goHome()">Home</a><span>›</span><a onclick="goCategory('${art.cat}')">${art.catLabel}</a><span>›</span><span style="color:var(--ink3)">${art.title.substring(0,40)}…</span></div>
        <div class="article-cat-badge">${art.catLabel}</div>
        <h1 class="article-headline">${art.title}</h1>
        <div class="article-dek">${art.dek}</div>
        <div class="article-meta-bar"><span>By <span class="article-author">${art.author}</span></span><span>·</span><span>${art.date}</span><span>·</span><span>${art.readTime}</span><div class="article-share"><span class="share-btn" onclick="copyLink(this)">🔗 Share</span><span class="share-btn" onclick="shareToFb()">f Share</span><span class="share-btn" onclick="shareToX()">𝕏 Tweet</span></div></div>
        <div class="article-hero-wrap"><img src="${art.img}" alt="${art.imgAlt}" id="ahImg_${art.id}"/><button class="wm-dl-btn" style="opacity:1!important" onclick="(function(){downloadImageWithWatermark(document.getElementById('ahImg_${art.id}'),'selectme_${art.id}.jpg')})()">⬇ Download</button></div>
        ${art.imgCap?`<div class="article-img-cap">${art.imgCap}</div>`:''}
        ${bodyHtml}
        ${AD.midStrip()}
        ${tagsHtml}
        <div class="related-articles"><div class="related-title">More Stories</div><div class="related-grid">${related}</div></div>

function setMeta(name,content,isOg){if(!content)return;const attr=isOg?'property':'name';let el=document.querySelector(`meta[${attr}="${name}"]`);if(!el){el=document.createElement('meta');el.setAttribute(attr,name);document.head.appendChild(el);}el.setAttribute('content',content);}
function setCanonical(url){let el=document.querySelector('link[rel="canonical"]');if(!el){el=document.createElement('link');el.setAttribute('rel','canonical');document.head.appendChild(el);}el.setAttribute('href',url);}
function switchLang(btn,showId,hideId){document.getElementById(showId).style.display='block';document.getElementById(hideId).style.display='none';btn.closest('.lang-tabs').querySelectorAll('.lang-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}

var _shuffleTimer=null,_countdownTimer=null,_isOnHomePage=false;
function secsToNextShuffle(){const now=new Date();const totalSecs=now.getMinutes()*60+now.getSeconds();return(5*60)-(totalSecs%(5*60));}
function fmtCountdown(secs){const m=Math.floor(secs/60),s=secs%60;return m+':'+(s<10?'0':'')+s;}
function startShuffleTimers(){if(_countdownTimer)clearInterval(_countdownTimer);_countdownTimer=setInterval(()=>{const el=document.getElementById('shuffleCountdown');if(el)el.textContent=fmtCountdown(secsToNextShuffle());},1000);scheduleNextShuffle();}
function scheduleNextShuffle(){if(_shuffleTimer)clearTimeout(_shuffleTimer);_shuffleTimer=setTimeout(()=>{if(_isOnHomePage){buildHomePage();showPage('pageHome');}scheduleNextShuffle();},secsToNextShuffle()*1000);}

var _rssVideoCache=null;

function _getRssFeeds(){
  // Load RSS feed URLs from localStorage (saved by ads-admin.html RSS Manager)
  try{
    var stored=JSON.parse(localStorage.getItem('selectme_rss_feeds')||'[]');
    return Array.isArray(stored)?stored.filter(f=>f.url&&f.enabled!==false):[];
  }catch{return[];}

async function _fetchRssFeed(feedObj){
  // Use allorigins.win CORS proxy to fetch RSS
  var url=feedObj.url.trim();
  var proxy='https://api.allorigins.win/get?url='+encodeURIComponent(url);
  try{
    var res=await fetch(proxy,{signal:AbortSignal.timeout(8000)});
    if(!res.ok)throw new Error('HTTP '+res.status);
    var data=await res.json();
    var xml=data.contents||'';
    var parser=new DOMParser();
    var doc=parser.parseFromString(xml,'application/xml');
    var items=Array.from(doc.querySelectorAll('item,entry'));
    return items.slice(0,8).map(function(item){
      var title=(item.querySelector('title')||{}).textContent||'';
      var link=(item.querySelector('link')||{}).textContent||(item.querySelector('link')||{}).getAttribute&&item.querySelector('link').getAttribute('href')||'';
      var pubDate=(item.querySelector('pubDate,published,updated')||{}).textContent||'';
      // Try to extract thumbnail from media:thumbnail, enclosure, or og in description
      var thumb='';
      var mediaTh=item.querySelector('thumbnail')||item.querySelector('[url]');
      if(mediaTh)thumb=mediaTh.getAttribute('url')||mediaTh.getAttribute('href')||'';
      if(!thumb){var enc=item.querySelector('enclosure[type^="image"]');if(enc)thumb=enc.getAttribute('url')||'';}
      if(!thumb){
        // Try to parse img from description/content
        var desc=(item.querySelector('description,summary,content')||{}).textContent||'';
        var imgMatch=desc.match(/<img[^>]+src=["']([^"']+)["']/i);
        if(imgMatch)thumb=imgMatch[1];
      }
      // Extract YouTube video ID if possible
      var videoId='';
      var ytMatch=(link||'').match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
      if(ytMatch){videoId=ytMatch[1];if(!thumb)thumb='https://img.youtube.com/vi/'+videoId+'/mqdefault.jpg';}
      var dStr='';
      if(pubDate){try{var d=new Date(pubDate);if(!isNaN(d))dStr=d.toLocaleDateString('te-IN')||d.toLocaleDateString();}catch{}}
      return{title:title.trim(),link:link.trim(),thumb:thumb,videoId:videoId,date:dStr,source:feedObj.label||'Video'};
    }).filter(function(v){return v.title&&v.link;});
  }catch(e){console.warn('[RSS]',feedObj.url,e.message);return[];}
}

  _rssVideoLoading=true;
  var feeds=_getRssFeeds();
  var gridEl=document.getElementById('videoGrid');
  if(!gridEl){_rssVideoLoading=false;return;}
  if(!feeds.length){_rssVideoLoading=false;return;}
  gridEl.innerHTML='<div class="vb-loader" style="grid-column:1/-1"><div class="mini-spin"></div>Videos load అవుతున్నాయి…</div>';
  var allItems=[];
  await Promise.all(feeds.map(async function(f){
    var items=await _fetchRssFeed(f);
    allItems=allItems.concat(items);
  }));
  // Dedupe by link, limit to 8
  var seen=new Set();
  allItems=allItems.filter(function(v){if(seen.has(v.link))return false;seen.add(v.link);return true;}).slice(0,8);
  _rssVideoCache=allItems;
  _rssVideoLoading=false;
  // If RSS returned nothing, fall back to article-based cards
  if(!allItems.length){
    var fb=_buildArticleVideoItems();
    gridEl.innerHTML=fb||'';
    return;
  }
  _renderVideoBand(gridEl,allItems);
}

function _renderVideoBand(gridEl,items){
  if(!items||!items.length){
    // Final fallback to article videos
    var fb=_buildArticleVideoItems();
    gridEl.innerHTML=fb||'<div style="color:#555;font-size:12px;padding:14px 0;grid-column:1/-1">Videos అందుబాటులో లేవు.</div>';
    return;
  }
  gridEl.innerHTML=items.slice(0,8).map(function(v){
    var thumb=v.thumb||'https://picsum.photos/seed/'+encodeURIComponent(v.title.substring(0,10))+'/480/270';
    var onclick=v.videoId?
      "window.open('https://www.youtube.com/watch?v="+v.videoId+"','_blank')":
      "window.open('"+v.link.replace(/'/g,"\\'")+"','_blank')";
    return '<div class="vg-card" onclick="'+onclick+'">'+
      '<div class="vg-img"><img src="'+thumb+'" alt="'+v.title.replace(/"/g,'&quot;')+'" onerror="this.src=\'https://picsum.photos/seed/vid/480/270\'"/>'+
      '<div class="vg-play"><div class="vg-play-btn">▶</div></div></div>'+
      '<div class="vg-body"><div class="vg-cat">'+v.source+'</div>'+
      '<div class="vg-title">'+v.title.substring(0,60)+(v.title.length>60?'…':'')+'</div>'+
      '<div class="vg-meta">'+v.date+'</div></div></div>';
  }).join('');
}

var CURRENT_LANG='te';
function switchEdition(lang,el){CURRENT_LANG=lang;document.querySelectorAll('.tu-ed a').forEach(a=>a.classList.remove('active'));if(el)el.classList.add('active');const hash=location.hash.replace('#','');const [type]=hash.split('/');if(!type||type==='home'){buildHomePage();showPage('pageHome');}else if(type==='category'){renderCategory(hash.split('/')[1]);showPage('pageCategory');}}
function artTitle(a){return CURRENT_LANG==='en'&&a.titleEn?a.titleEn:a.title;}
function artDek(a){if(CURRENT_LANG==='en'){const enText=a.bodyEn?a.bodyEn.replace(/<[^>]+>/g,'').substring(0,180)+'…':'';return enText||a.dek;}return a.dek||a.body.replace(/<[^>]+>/g,'').substring(0,180)+'…';}

function copyLink(btn){var url=location.href;if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(()=>_showCopied(btn)).catch(()=>_fallbackCopy(url,btn));}else _fallbackCopy(url,btn);}
function _fallbackCopy(text,btn){var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');_showCopied(btn);}catch(e){}document.body.removeChild(ta);}
function _showCopied(btn){var orig=btn.textContent;btn.textContent='✓ Copied!';btn.style.background='#166534';btn.style.color='#fff';btn.style.borderColor='#166534';setTimeout(()=>{btn.textContent=orig;btn.style.background='';btn.style.color='';btn.style.borderColor='';},2000);}
function shareToFb(){window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(location.href),'_blank','width=600,height=400');}
function shareToX(){var title=document.querySelector('.article-headline');var text=title?title.textContent.substring(0,100):document.title;window.open('https://x.com/intent/tweet?url='+encodeURIComponent(location.href)+'&text='+encodeURIComponent(text),'_blank','width=600,height=400');}

window.addEventListener('DOMContentLoaded',async function(){
  showLoader();
  const[articlesOk]=await Promise.all([loadAllArticles(),loadNavFromSheet()]);
  buildDynamicNav();
  if(!articlesOk){document.getElementById('pageHome').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:60vh;font-family:'Outfit',sans-serif"><div style="text-align:center;max-width:420px"><div style="font-size:48px;margin-bottom:16px">📂</div><h2 style="font-family:'Playfair Display',serif;margin-bottom:10px">Articles load కాలేదు</h2><p style="color:#666;font-size:13px;line-height:1.7"><code style="background:#f2f0eb;padding:2px 6px">data/index.json</code> file GitHub repo లో ఉందో check చేయండి.</p></div></div>`;showPage('pageHome');}
  else{restoreState();startShuffleTimers();initAds();
    // Load RSS video feeds — fallback to article videos if RSS empty/fails
    setTimeout(function(){
      var feeds=_getRssFeeds();
      var badge=document.getElementById('rssBadge');
      if(feeds.length){
        if(badge)badge.style.display='';
        loadRssVideos();
      }
      // No feeds → videoGrid already has article-based videos from buildHomePage, nothing to do
    },600);
  }
  initUI();
});
</script>
