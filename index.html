<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html{font-size:16px;scroll-behavior:smooth}
body{background:#f9f8f5;color:#111;font-family:'Outfit',sans-serif;line-height:1.5;overflow-x:hidden}

img{display:block;width:100%;object-fit:cover;background:#e5e3de}

}
.loader{width:36px;height:36px;border:3px solid var(--bdr);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}

.rwrap{position:relative;overflow:hidden;display:block}

.rwrap-t4-img{height:105px;margin-bottom:8px}

/* ═══════════ INSHORTS+WAY2NEWS HYBRID STYLE ═══════════ */
/* ── Root overrides for news feed ── */
body.feed-mode{background:#f0f2f5;font-family:'Noto Sans Telugu','Outfit',sans-serif}
body.feed-mode.dark{background:#0f1117;color:#e8e8e8}

/* ── Top nav bar (replaces complex header when feed active) ── */
#feedTopBar{display:none;position:sticky;top:0;z-index:900;background:#fff;border-bottom:2px solid #e53935;box-shadow:0 2px 8px rgba(0,0,0,.1)}
body.dark #feedTopBar{background:#1a1d27;border-bottom-color:#e53935}
.ftb-in{max-width:800px;margin:0 auto;padding:0 14px;display:flex;align-items:center;justify-content:space-between;height:50px;gap:10px}
.ftb-logo{display:flex;align-items:center;cursor:pointer;flex-shrink:0}
body.dark .ftb-logo svg{filter:brightness(0) invert(1)}
.ftb-search{flex:1;max-width:200px;height:32px;border:1.5px solid #ddd;border-radius:20px;padding:0 12px;font-size:12px;outline:none;font-family:inherit;background:#f7f7f7;transition:border .2s}
.ftb-search:focus{border-color:#e53935;background:#fff}
body.dark .ftb-search{background:#252836;border-color:#333;color:#eee}
.ftb-actions{display:flex;gap:4px;align-items:center}
.ftb-btn{width:34px;height:34px;border:none;background:none;cursor:pointer;font-size:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .15s;color:#444}
.ftb-btn:hover{background:#f0f0f0}
body.dark .ftb-btn{color:#ccc}
body.dark .ftb-btn:hover{background:#252836}

/* ── Category tabs (horizontal scroll) ── */


/* ── Feed scroll container ── */
#feedScroll{display:none;max-width:800px;margin:0 auto;padding:12px 14px 80px}

/* ── News Card ── */
.ncard{background:#fff;border-radius:12px;margin-bottom:14px;overflow:hidden;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:box-shadow .2s,transform .15s;position:relative}
.ncard:hover{box-shadow:0 4px 18px rgba(0,0,0,.14);transform:translateY(-1px)}
body.dark .ncard{background:#1e2130;box-shadow:0 1px 6px rgba(0,0,0,.4)}
/* Image */
.nc-img-wrap{position:relative;overflow:hidden;width:100%;height:200px}
.nc-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;background:#e8e8e8;transition:transform .35s ease}
.ncard:hover .nc-img-wrap img{transform:scale(1.03)}
.nc-cat-badge{position:absolute;top:10px;left:10px;background:#e53935;color:#fff;font-size:10px;font-weight:800;padding:3px 9px;border-radius:3px;text-transform:uppercase;letter-spacing:.06em}
.nc-share-fab{position:absolute;top:10px;right:10px;width:30px;height:30px;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:none;cursor:pointer;color:#fff;transition:background .15s;opacity:0}
.ncard:hover .nc-share-fab,.ncard:focus-within .nc-share-fab{opacity:1}
/* Body */
.nc-body{padding:13px 14px 10px}
.nc-meta{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.nc-source{font-size:11px;font-weight:700;color:#e53935;text-transform:uppercase;letter-spacing:.04em}
.nc-dot{width:3px;height:3px;background:#bbb;border-radius:50%}
.nc-time{font-size:11px;color:#999}
.nc-title{font-size:18px;font-weight:700;color:#111;line-height:1.4;margin-bottom:7px;font-family:'Noto Sans Telugu','Outfit',sans-serif}
body.dark .nc-title{color:#eee}
.nc-summary{font-size:14px;color:#555;line-height:1.7;font-family:'Noto Sans Telugu','Outfit',sans-serif;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
body.dark .nc-summary{color:#aaa}
/* Footer actions */
.nc-footer{display:flex;align-items:center;justify-content:space-between;padding:9px 14px 11px;border-top:1px solid #f0f0f0}

// AD ENGINE — ads-admin.html నుండి localStorage లో save అయిన
// ads ని dynamically load చేస్తుంది
// ═══════════════════════════════════════════════════════════════
const ADS_STORAGE_KEY = 'selectme_ads_v2';
const ADS_SETTINGS_KEY = 'selectme_ads_settings';

// localStorage నుండి active ads load చేయడం
function _loadAds() {
  try { return JSON.parse(localStorage.getItem(ADS_STORAGE_KEY)) || []; } catch { return []; }
}
function _loadAdSettings() {
  const defaults = {
    master_enabled:true, popup_enabled:true, float_enabled:true,
    sidebar_enabled:true, home_ads:true, article_ads:true,
    category_ads:true, static_ads:true, popup_delay:5, float_delay:8
  };
  try { return { ...defaults, ...JSON.parse(localStorage.getItem(ADS_SETTINGS_KEY)) }; }
  catch { return defaults; }
}

// Type → slot name mapping
function _adByType(type, page) {
  const s = _loadAdSettings();
  if (!s.master_enabled) return null;
  if (page === 'home' && !s.home_ads) return null;
  if (page === 'article' && !s.article_ads) return null;
  if (page === 'category' && !s.category_ads) return null;
  if (page === 'static' && !s.static_ads) return null;
  const ads = _loadAds();
  return ads.find(a => a.type === type && a.status === 'active' && (!page || !a.pages || a.pages.includes(page))) || null;
}

// Single ad HTML builder — same logic as ads-admin.html
function _buildAdHtml(ad) {
  if (!ad) return '';
  if (ad.customhtml && ad.customhtml.trim()) return ad.customhtml;
  const bg = ad.bg || 'linear-gradient(90deg,#131921,#232f3e)';
  const url = ad.url || '#';
  const emoji = ad.emoji || '📢';
  const hl = (ad.headline||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const sub = (ad.subtext||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const cta = (ad.cta||'Learn More').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  if (ad.type === 'banner' || ad.type === 'midstrip') {
    return `<div class="ad-wrap" style="margin:14px 0"><div class="ad-label">Advertisement</div><div style="width:100%;height:90px;background:${bg};display:flex;align-items:center;justify-content:space-between;padding:0 24px;cursor:pointer;overflow:hidden" onclick="window.open('${url}','_blank')"><div style="display:flex;align-items:center;gap:14px"><div style="font-size:26px">${emoji}</div><div><div style="color:#fff;font-size:14px;font-weight:700">${hl}</div><div style="color:rgba(255,255,255,.5);font-size:10px;margin-top:3px">${sub}</div></div></div><div style="background:#ff9900;color:#111;font-size:11px;font-weight:900;padding:9px 20px;white-space:nowrap;flex-shrink:0">${cta}</div></div></div>`;
  }
  if (ad.type === 'leaderboard') {
    return `<div class="ad-wrap" style="margin:0 0 16px"><div class="ad-label">Advertisement</div><div style="width:100%;height:80px;background:${bg};display:flex;align-items:center;justify-content:space-between;padding:0 24px;cursor:pointer;border:1px solid #2a1a1a" onclick="window.open('${url}','_blank')"><div style="display:flex;align-items:center;gap:14px"><div style="width:44px;height:44px;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${emoji}</div><div><div style="color:#fff;font-size:13px;font-weight:700">${hl}</div><div style="color:rgba(255,255,255,.4);font-size:9px;margin-top:2px">${sub}</div></div></div><div style="background:var(--red);color:#fff;font-size:10px;font-weight:800;padding:8px 18px;white-space:nowrap;flex-shrink:0">${cta}</div></div></div>`;
  }
  if (ad.type === 'incontent') {
    return `<div class="ad-wrap" style="margin:28px 0"><div class="ad-label">Advertisement</div><div style="width:100%;height:220px;background:${bg};display:flex;align-items:center;justify-content:center;gap:24px;cursor:pointer;padding:0 24px" onclick="window.open('${url}','_blank')"><div style="text-align:center;flex-shrink:0"><div style="font-size:36px;margin-bottom:4px">${emoji}</div><div style="color:rgba(255,255,255,.4);font-size:9px;text-transform:uppercase;letter-spacing:.1em">Sponsored</div></div><div style="color:#fff"><div style="font-size:20px;font-weight:700;line-height:1.2;margin-bottom:8px">${hl}</div><div style="font-size:11px;color:rgba(255,255,255,.55);line-height:1.6;margin-bottom:12px">${sub}</div><div style="display:inline-block;background:#ff9900;color:#111;font-size:10px;font-weight:800;padding:8px 20px;text-transform:uppercase;letter-spacing:.08em">${cta}</div></div></div></div>`;
  }
  if (ad.type === 'sidebar') {
    return `<div class="sb-ad"><div style="width:100%;height:280px;background:${bg};display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer" onclick="window.open('${url}','_blank')"><div style="font-size:28px">${emoji}</div><div style="color:#fff;font-size:16px;font-weight:900;text-align:center;padding:0 16px;line-height:1.3;font-family:'Playfair Display',serif">${hl}</div><div style="color:rgba(255,255,255,.7);font-size:12px;font-style:italic">${sub}</div><div style="background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:8px 22px;text-transform:uppercase;cursor:pointer">${cta}</div></div><div class="al">Advertisement</div></div>`;
  }
  // floatbar / popup handled separately
  return '';
}

// ── PUBLIC AD OBJECT — site అంతటా ఇవే call అవుతాయి ──
const AD = {
  banner:     (page)=>{ const a=_adByType('banner',page||'home');     return a?_buildAdHtml(a):''; },
  inContent:  (page)=>{ const a=_adByType('incontent',page||'article'); return a?_buildAdHtml(a):''; },
  sidebarBox: (page)=>{ const s=_loadAdSettings(); if(!s.sidebar_enabled)return ''; const a=_adByType('sidebar',page||'article'); return a?_buildAdHtml(a):''; },
  leaderboard:(page)=>{ const a=_adByType('leaderboard',page||'category'); return a?_buildAdHtml(a):''; },
  midStrip:   (page)=>{ const a=_adByType('midstrip',page||'home');    return a?_buildAdHtml(a):''; },
  education:  (page)=>{ const a=_adByType('incontent',page||'article'); return a?_buildAdHtml(a):''; },
};

// Helper: article body లో Nth </p> తర్వాత ad inject చేయడం
function injectAdAfterParagraph(html, n, adHtml) {
  if (!adHtml) return html;
  let count = 0;
  return html.replace(/<\/p>/gi, m => { count++; return count === n ? '</p>' + adHtml : m; });
}

const SHEET_GID='568663683';
let NAV_STRUCTURE=[];

async function loadNavFromSheet(){
  const csvUrl=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${SHEET_GID}`;
  try{const res=await fetch(csvUrl);if(!res.ok)throw new Error('Sheet fetch failed: '+res.status);const text=await res.text();parseSheetNav(text);return true;}
  catch(e){console.warn('[Nav] Sheet load failed:',e.message);buildNavFromArticles();return false;}
}
function parseSheetNav(csvText){
  const lines=csvText.trim().split('\n');if(!lines.length)return;
  const cols=[];
  lines.forEach((line,rowIdx)=>{
    const cells=parseCSVLine(line);
    cells.forEach((cell,colIdx)=>{
      const val=cell.trim();if(!val)return;
      if(!cols[colIdx])cols[colIdx]={label:'',subs:[]};
      if(rowIdx===0){cols[colIdx].label=val;cols[colIdx].key=val.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');}
      else{cols[colIdx].subs.push({label:val,key:val.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_\u0c00-\u0c7f]/g,'')||val});}
    });
  });
  NAV_STRUCTURE=cols.filter(c=>c.label);
}
function parseCSVLine(line){
  const result=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(ch===','&&!inQ){result.push(cur);cur='';}else{cur+=ch;}}
  result.push(cur);return result;
}
function buildNavFromArticles(){
  const seen=new Set();NAV_STRUCTURE=[];
  Object.values(ARTICLES).forEach(a=>{if(!seen.has(a.cat)){seen.add(a.cat);const label=(CATEGORIES[a.cat]&&CATEGORIES[a.cat].label)?CATEGORIES[a.cat].label:(a.catLabel||a.cat);NAV_STRUCTURE.push({key:a.cat,label,subs:[]});}});
}

function normalizeArticle(raw){
  if(!raw||!raw.id)return null;
  const bc=raw.blog_content||{};
  let bodyTe='',bodyEn='';
  if(typeof bc==='string'){bodyTe=bc;}
  else if(typeof bc==='object'){bodyTe=bc.telugu||'';bodyEn=bc.english||'';}
  function toHtml(text){if(!text)return '';if(/<[a-z][\s\S]*>/i.test(text))return text;return text.split(/\n\s*\n/).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).filter(p=>p!=='<p></p>').join('');}
  bodyTe=toHtml(bodyTe);bodyEn=toHtml(bodyEn);
  const body=bodyTe||bodyEn;
  const seo=raw.seo||{};
  const rawCat=(raw.category||'news').toString().trim().toLowerCase().replace(/\s+/g,'_');
  return{
    id:raw.id,cat:rawCat,catLabel:raw.category_label||raw.category||'News',
    title:raw.telugu_title||raw.english_title||raw.title||'Untitled',
    titleEn:raw.english_title||raw.title||raw.telugu_title||'',
    dek:raw.telugu_excerpt||raw.excerpt||'',
    author:raw.author||'Selectme Editorial',date:raw.published_date||raw.date||'',
    _ts:(function(){var d=raw.published_date||raw.date||'';if(!d)return 0;var t=Date.parse(d);return isNaN(t)?0:t;})(),
    readTime:raw.read_time||'5 min read',
    img:(raw.media&&raw.media.featured_image)?raw.media.featured_image:`https://picsum.photos/seed/${raw.id}/900/500`,
    tags:Array.isArray(raw.tags)?raw.tags:(typeof raw.tags==='string'&&raw.tags.trim()?raw.tags.split(',').map(t=>t.trim()).filter(Boolean):[]),
    imgAlt:(function(){
      if(raw.media&&raw.media.featured_image_alt&&raw.media.featured_image_alt.trim())return raw.media.featured_image_alt.trim();
      var ytTags=raw.youtube_metadata&&Array.isArray(raw.youtube_metadata.tags)&&raw.youtube_metadata.tags.length?raw.youtube_metadata.tags.join(', '):'';
      if(ytTags)return ytTags;
      return raw.telugu_title||raw.english_title||raw.title||'';
    })(),
    imgCap:(raw.media&&raw.media.featured_image_caption&&raw.media.featured_image_caption.trim())?raw.media.featured_image_caption.trim():'',
    body,bodyTe,bodyEn,
    seoTitle:seo.title||seo.meta_title||(raw.youtube_metadata&&raw.youtube_metadata.title?raw.youtube_metadata.title:'')||raw.telugu_title||raw.english_title||'',
    seoDescription:seo.description||seo.meta_description||raw.telugu_excerpt||raw.excerpt||'',
    seoKeywords:(function(){
      var k1=Array.isArray(seo.keywords)?seo.keywords:(typeof seo.keywords==='string'&&seo.keywords.trim()?seo.keywords.split(',').map(function(s){return s.trim();}).filter(Boolean):[]);
      var k2=raw.youtube_metadata&&Array.isArray(raw.youtube_metadata.tags)?raw.youtube_metadata.tags:[];
      var merged=[...new Set([...k1,...k2])];
      return merged.join(', ');
    })(),
    related:raw.related_articles||[]
  };
}

const LOADED_CATS=new Set();

async function loadAllArticles(){
  let fileList=[];
  const RAW='https://raw.githubusercontent.com/selectmeinfo-cloud/my-json-data/main/data/';
  const GITHUB_API='https://api.github.com/repos/selectmeinfo-cloud/my-json-data/contents/data';

  // Step 1: index.json try first (no rate limit)
  try{
    const idxRes=await fetch(RAW+'index.json');
    if(idxRes.ok){
      const idx=await idxRes.json();
      if(Array.isArray(idx)&&idx.length){
        fileList=idx.filter(f=>typeof f==='string'?f.endsWith('.json'):f.name&&f.name.endsWith('.json'))
                    .map(f=>typeof f==='string'?f:f.name)
                    .filter(f=>f!=='index.json'&&f!=='manifest.json');
        console.log('[selectme] index.json found:',fileList.length,'files');
      }else if(idx&&typeof idx==='object'&&idx.files){
        fileList=idx.files.filter(f=>f.endsWith('.json')&&f!=='index.json'&&f!=='manifest.json');
      }
    }
  }catch(e){console.warn('[selectme] index.json failed:',e.message);}

  // Step 2: GitHub API fallback
  if(!fileList.length){
    try{
      const res=await fetch(GITHUB_API,{headers:{'Accept':'application/vnd.github.v3+json'}});
      if(!res.ok)throw new Error('GitHub API '+res.status+(res.status===403?' (rate limited — index.json create చేయండి)':''));
      const files=await res.json();
      if(Array.isArray(files)){
        fileList=files.filter(f=>f.name&&f.name.endsWith('.json')&&f.name!=='index.json'&&f.name!=='manifest.json').map(f=>f.name);
        console.log('[selectme] GitHub API:',fileList.length,'files');
      }
    }catch(e){console.error('[selectme] GitHub API error:',e.message);}
  }

  if(!fileList.length){console.error('[selectme] No JSON files found in data/');return false;}

  const results=await Promise.all(fileList.map(fname=>fetch(RAW+fname).then(r=>r.ok?r.json():null).catch(()=>null)));
  let loaded=0;
  results.forEach(raw=>{
    const art=normalizeArticle(raw);if(!art)return;
    ARTICLES[art.id]=art;
    const catKey=art.cat;
    if(!CATEGORIES[catKey])CATEGORIES[catKey]={icon:'📂',label:art.catLabel||catKey,articles:[]};
    if(!CATEGORIES[catKey].articles.includes(art.id))CATEGORIES[catKey].articles.push(art.id);
    LOADED_CATS.add(catKey);
    loaded++;
  });
  console.log('[selectme] Articles loaded:',loaded);
  Object.keys(CATEGORIES).forEach(function(catKey){
    CATEGORIES[catKey].articles.sort(function(a,b){
      var ta=ARTICLES[a]?ARTICLES[a]._ts:0;
      var tb=ARTICLES[b]?ARTICLES[b]._ts:0;
      return tb-ta;
    });
  });
  return loaded>0;
}

async function loadCategoryArticles(cat){
  if(LOADED_CATS.has(cat))return true;
  // GitHub Pages: files.php?category= లేదు — loadAllArticles() లో అన్నీ load అయాయి
  const navItem=NAV_STRUCTURE.find(n=>n.key===cat);
  const navSubKeys=(navItem&&navItem.subs)?navItem.subs.map(s=>s.key):[];
  const prefixSubKeys=Object.keys(CATEGORIES).filter(k=>k!==cat&&(k.startsWith(cat+'_')||k.endsWith('_'+cat)));
  const allSubKeys=[...new Set([...navSubKeys,...prefixSubKeys])];
  [...allSubKeys,cat].forEach(k=>LOADED_CATS.add(k));
  return true;
}

          '<div class="rwrap rwrap-cgi-img"><img src="'+thumb+'" alt="'+v.title.replace(/"/g,'&quot;')+'" onerror="this.src=\'https://picsum.photos/seed/vid/480/270\'" class="cgi-img"/>'+
          '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none"><div style="width:32px;height:32px;background:rgba(255,255,255,.85);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;padding-left:2px">▶</div></div></div>'+
          '<div class="cgi-title">'+v.title+'</div>'+

      }).join('');
    }
    // Also append article-based videos
    if(artVideoIds.length){
      cards+=artVideoIds.map(function(id){var a=ARTICLES[id];if(!a)return '';
        return '<div class="cat-grid-item" onclick="goArticle(\''+a.cat+'\',\''+a.id+'\')">'+
          '<div class="rwrap rwrap-cgi-img" style="position:relative"><img src="'+a.img+'" alt="'+a.imgAlt+'" class="cgi-img"/>'+
          '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none"><div style="width:32px;height:32px;background:rgba(255,255,255,.85);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;padding-left:2px">▶</div></div></div>'+
          '<div class="cgi-title">'+a.title+'</div><div class="cgi-meta">'+a.author+' · '+a.date+'</div></div>';
      }).join('');
    }
    return cards||'<div style="grid-column:1/-1;padding:28px;text-align:center;color:#888">Videos ఇంకా load అవుతున్నాయి…</div>';
  }
  var totalCount=((_rssVideoCache&&_rssVideoCache.length)||0)+artVideoIds.length;
  document.getElementById('pageCategory').innerHTML=
    '<div class="cat-page page-view">'+AD.leaderboard()+
    '<div class="cat-header"><div class="cat-header-icon">▶</div>'+
    '<div class="cat-header-name">'+(catData.label||'Video')+'</div>'+
    (totalCount?'<div class="cat-header-count">'+totalCount+' videos</div>':'')+
    '</div>'+AD.banner()+
    '<div class="cat-layout"><div class="cat-main">'+
    '<div class="cat-grid" id="videoCatGrid" style="border:1px solid var(--bdr)">'+
      _buildVideoCatGrid(_rssVideoCache)+
    '</div>'+AD.midStrip()+'</div></div></div>';

  if(!_rssVideoCache&&_getRssFeeds().length){
    loadRssVideos().then(function(){
      var g=document.getElementById('videoCatGrid');
      if(g)g.innerHTML=_buildVideoCatGrid(_rssVideoCache);
    });
  }

function secsToNextShuffle(){const now=new Date();const totalSecs=now.getMinutes()*60+now.getSeconds();return(5*60)-(totalSecs%(5*60));}
function fmtCountdown(secs){const m=Math.floor(secs/60),s=secs%60;return m+':'+(s<10?'0':'')+s;}
function startShuffleTimers(){if(_countdownTimer)clearInterval(_countdownTimer);_countdownTimer=setInterval(()=>{const el=document.getElementById('shuffleCountdown');if(el)el.textContent=fmtCountdown(secsToNextShuffle());},1000);scheduleNextShuffle();}
function scheduleNextShuffle(){if(_shuffleTimer)clearTimeout(_shuffleTimer);_shuffleTimer=setTimeout(()=>{if(_isOnHomePage){buildHomePage();showPage('pageHome');}scheduleNextShuffle();},secsToNextShuffle()*1000);}

// ═══════════════════════════════════════════════════════════
// INSHORTS + WAY2NEWS HYBRID — FEED ENGINE
// ═══════════════════════════════════════════════════════════
var FEED = {
  activeCat: 'all',
  page: 0,
  perPage: 10,
  loading: false,
  allLoaded: false,
  darkMode: false,
  bookmarks: {},
  filtered: [],
  observer: null,
  shareArt: null,
  _savedScrollY: 0,
  _lastRenderedDay: null,

  // Bottom nav categories config
  bottomNavCats: [
    {key:'all',   icon:'🏠', label:'Home'},
    {key:'politics', icon:'🏛️', label:'Politics'},
    {key:'cinema',   icon:'🎬', label:'Cinema'},
    {key:'sports',   icon:'⚽', label:'Sports'},
    {key:'devotional',icon:'🙏',label:'Bhakti'},
    {key:'jobs',     icon:'💼', label:'Jobs'},
  ],

  init: function() {
    // bookmarks & darkMode already initialized in DOMContentLoaded
    document.body.classList.add('feed-mode');
    // Show feed UI elements
    document.getElementById('feedTopBar').style.display = 'block';
    
    document.getElementById('feedScroll').style.display = 'block';
    // feedBottomNav is always visible on mobile via CSS — no need to force show
    // Mobile లో మాత్రమే sharedHeader hide చేయి
    var sh = document.getElementById('sharedHeader');
    if (sh && window.innerWidth <= 900) sh.style.display = 'none';

    // Don't rebuild bottom nav — already built in DOMContentLoaded
    this.reset();
  },

  reset: function() {
    this.page = 0;
    this.allLoaded = false;
    this.loading = false;
    this._lastRenderedDay = null;
    var fs = document.getElementById('feedScroll');
    fs.innerHTML = '';
    this.buildFiltered();
    this.loadMore();
    this.setupInfiniteScroll();
  },

  buildFiltered: function() {
    var artList = Object.values(ARTICLES);
    if (this.activeCat === 'all') {
      this.filtered = artList.slice().sort(function(a,b){
        return (b._ts||0) - (a._ts||0);
      });
      return;
    }
    var navItem = NAV_STRUCTURE.find(function(n){return n.key===FEED.activeCat;});
    var subKeys = (navItem && navItem.subs) ? navItem.subs.map(function(s){return s.key;}) : [];
    this.filtered = artList.filter(function(a){
      return a.cat===FEED.activeCat || subKeys.includes(a.cat) ||
             a.cat.startsWith(FEED.activeCat+'_') || a.cat.endsWith('_'+FEED.activeCat);
    }).sort(function(a,b){
      return (b._ts||0) - (a._ts||0);
    });
  },

  loadMore: function() {
    if (this.loading || this.allLoaded) return;
    this.loading = true;
    var fs = document.getElementById('feedScroll');

    // Show loader
    var loader = document.createElement('div');
    loader.id = 'feedLoader';
    loader.className = 'feed-loader';
    loader.innerHTML = '<div class="feed-loader-dot"></div><div class="feed-loader-dot"></div><div class="feed-loader-dot"></div>';
    fs.appendChild(loader);

    var self = this;
    setTimeout(function() {
      var start = self.page * self.perPage;
      var batch = self.filtered.slice(start, start + self.perPage);

      // Remove loader
      var ld = document.getElementById('feedLoader');
      if (ld) ld.remove();

      if (!batch.length) {
        self.allLoaded = true;
        self.loading = false;
        if (self.filtered.length === 0) {
          fs.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#aaa;font-family:\'Outfit\',sans-serif"><div style="font-size:48px;margin-bottom:12px">📭</div><div>ఈ category లో articles లేవు</div></div>';
        }
        return;
      }

      batch.forEach(function(a, i) {
        // ── Date group header ──
        var dayKey = (a.date||'').substring(0,10); // "YYYY-MM-DD"
        if (dayKey && dayKey !== self._lastRenderedDay) {
          self._lastRenderedDay = dayKey;
          var hdr = document.createElement('div');
          hdr.className = 'feed-day-header';
          hdr.textContent = self._dayLabel(dayKey);
          fs.appendChild(hdr);
        }

        var card;
        // Alternate: every 3rd card is compact (text+small image)
        if ((start + i) % 4 === 3) {
          card = self.buildCompactCard(a);
        } else {
          card = self.buildCard(a);
        }
        fs.appendChild(card);
        // Stagger animation
        card.style.opacity = '0';
        card.style.transform = 'translateY(16px)';
        setTimeout(function(){ card.style.transition='opacity .3s ease,transform .3s ease'; card.style.opacity='1'; card.style.transform='translateY(0)'; }, i * 50);
      });

      self.page++;
      self.loading = false;
      if (self.page * self.perPage >= self.filtered.length) self.allLoaded = true;
    }, 200);
  },

  buildCard: function(a) {
    var el = document.createElement('div');
    el.className = 'ncard';
    var timeAgo = this.timeAgo(a.date);
    var summary = (a.dek || a.body.replace(/<[^>]+>/g,'')).substring(0,200);
    var isBookmarked = !!this.bookmarks[a.id];
    el.innerHTML =
      '<div class="nc-img-wrap">' +

  setupInfiniteScroll: function() {
    if(this.observer) this.observer.disconnect();
    var sentinel = document.getElementById('feedSentinel');
    if(!sentinel){
      sentinel = document.createElement('div');
      sentinel.id = 'feedSentinel';
      sentinel.style.height = '10px';
      document.getElementById('feedScroll').appendChild(sentinel);
    }
    this.observer = new IntersectionObserver(function(entries){
      if(entries[0].isIntersecting && !FEED.loading && !FEED.allLoaded){
        FEED.loadMore();
      }
    }, {rootMargin:'200px'});
    this.observer.observe(sentinel);

  _dayLabel: function(dayKey) {
    // dayKey = "YYYY-MM-DD"
    if (!dayKey) return '';
    var today    = new Date(); today.setHours(0,0,0,0);
    var yesterday= new Date(today); yesterday.setDate(today.getDate()-1);
    var d        = new Date(dayKey + 'T00:00:00');
    if (isNaN(d)) return dayKey;
    if (d.getTime() === today.getTime())     return '📅 ఈ రోజు వార్తలు';
    if (d.getTime() === yesterday.getTime()) return '📅 నిన్న వార్తలు';
    var diff = Math.floor((today - d) / 86400000);
    if (diff < 7) return '📅 ' + diff + ' రోజుల క్రితం వార్తలు';
    try {
      return '📅 ' + d.toLocaleDateString('te-IN', {year:'numeric', month:'long', day:'numeric'});
    } catch(e) {
      return '📅 ' + dayKey;
    }
  },

  timeAgo: function(dateStr) {
    if(!dateStr) return '';
    var now = Date.now();
    var then = new Date(dateStr).getTime();
    if(isNaN(then)) return dateStr;
    var diff = Math.floor((now - then) / 1000);
    if(diff < 60)   return diff + 's ago';
    if(diff < 3600) return Math.floor(diff/60) + 'm ago';
    if(diff < 86400)return Math.floor(diff/3600) + 'h ago';
    return Math.floor(diff/86400) + 'd ago';
  },

  toggleBookmark: function(e, id, btn) {
    e.stopPropagation();
    if(this.bookmarks[id]) {
      delete this.bookmarks[id];
      btn.classList.remove('bookmarked');
      btn.querySelector('svg').setAttribute('fill','none');
      btn.childNodes[1].textContent = ' Save';
    } else {
      this.bookmarks[id] = true;
      btn.classList.add('bookmarked');
      btn.querySelector('svg').setAttribute('fill','currentColor');
      btn.childNodes[1].textContent = ' Saved';
    }
    localStorage.setItem('sm_bookmarks', JSON.stringify(this.bookmarks));
  },

  showSaved: function() {
    this.activeCat = '__saved';
    var saved = Object.keys(this.bookmarks);
    this.filtered = saved.map(function(id){return ARTICLES[id];}).filter(Boolean);
    this.page = 0;
    this.allLoaded = false;
    this.loading = false;
    var fs = document.getElementById('feedScroll');
    fs.innerHTML = '';
    this.loadMore();
    this.setupInfiniteScroll();
  },

  openShare: function(e, id) {
    e.stopPropagation();
    this.shareArt = ARTICLES[id];
    var popup = document.getElementById('sharePopup');
    var title = this.shareArt ? this.shareArt.title : document.title;
    var url = location.href.split('#')[0] + '#article/' + (this.shareArt ? this.shareArt.cat+':'+id : '');
    document.getElementById('spTitle').textContent = title.substring(0,60) + (title.length>60?'…':'');
    document.getElementById('spWa').onclick   = function(){ window.open('https://wa.me/?text='+encodeURIComponent(title+'\n'+url),'_blank'); };
    document.getElementById('spTw').onclick   = function(){ window.open('https://x.com/intent/tweet?text='+encodeURIComponent(title)+'&url='+encodeURIComponent(url),'_blank'); };
    document.getElementById('spFb').onclick   = function(){ window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(url),'_blank'); };
    document.getElementById('spCopy').onclick = function(){
      navigator.clipboard.writeText(url).then(function(){
        document.getElementById('spCopy').querySelector('span').textContent='Copied!';
        setTimeout(function(){document.getElementById('spCopy').querySelector('span').textContent='Copy Link';},1800);
      });
    };
    popup.classList.add('open');
  },

  _searchMode: function(q) {
    if (!q) { this.buildFiltered(); this.page=0; this.allLoaded=false; document.getElementById('feedScroll').innerHTML=''; this.loadMore(); this.setupInfiniteScroll(); return; }
    var lq=q.toLowerCase();
    this.filtered = Object.values(ARTICLES).filter(function(a){ return (a.title||'').toLowerCase().includes(lq)||(a.dek||'').toLowerCase().includes(lq); });
    this.page=0; this.allLoaded=false; document.getElementById('feedScroll').innerHTML=''; this.loadMore(); this.setupInfiniteScroll();
  },

  toggleDark: function() {
    this.darkMode = !this.darkMode;
    document.body.classList.toggle('dark', this.darkMode);
    localStorage.setItem('sm_dark', this.darkMode ? '1' : '0');
    var toggle = document.getElementById('dmToggle');
    if(toggle) toggle.classList.toggle('on', this.darkMode);
  }
};

function buildHomePage() {
  _isOnHomePage = true;
  var artList = Object.values(ARTICLES);
  if (!artList.length) {
    document.getElementById('pageHome').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:60vh">' +
      '<div style="text-align:center"><div class="loader"></div>' +
      '<p style="margin-top:14px;font-size:13px;color:#888;font-family:\'Outfit\',sans-serif">Articles load అవుతున్నాయి…</p></div></div>';
    showPage('pageHome');
    return;
  }
  // Hide inner pages, show feed
  ['pageArticle','pageCategory','pageStatic'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.style.display='none';
  });
  document.getElementById('pageHome').innerHTML = '';
  document.getElementById('pageHome').style.display = 'none';
  FEED.activeCat = 'all';
  FEED.init();
  // Ensure home tab is active in bottom nav
  if(FEED._activateBottomBtn) FEED._activateBottomBtn('home');
}

// ═══════════════════════════════════════════════════════════════
// RSS VIDEO FEED — loads from admin-saved RSS URLs
// ═══════════════════════════════════════════════════════════════
var _rssVideoCache=null;
var _rssVideoLoading=false;

function _getRssFeeds(){
  // Load RSS feed URLs from localStorage (saved by ads-admin.html RSS Manager)
  try{
    var stored=JSON.parse(localStorage.getItem('selectme_rss_feeds')||'[]');
    return Array.isArray(stored)?stored.filter(f=>f.url&&f.enabled!==false):[];
  }catch{return[];}
}

async function _fetchRssFeed(feedObj){
  // Use allorigins.win CORS proxy to fetch RSS
  var url=feedObj.url.trim();
  var proxy='https://api.allorigins.win/get?url='+encodeURIComponent(url);
  try{
    var res=await fetch(proxy,{signal:AbortSignal.timeout(8000)});
    if(!res.ok)throw new Error('HTTP '+res.status);
    var data=await res.json();
    var xml=data.contents||'';
    var parser=new DOMParser();
    var doc=parser.parseFromString(xml,'application/xml');
    var items=Array.from(doc.querySelectorAll('item,entry'));
    return items.slice(0,8).map(function(item){
      var title=(item.querySelector('title')||{}).textContent||'';
      var link=(item.querySelector('link')||{}).textContent||(item.querySelector('link')||{}).getAttribute&&item.querySelector('link').getAttribute('href')||'';
      var pubDate=(item.querySelector('pubDate,published,updated')||{}).textContent||'';
      // Try to extract thumbnail from media:thumbnail, enclosure, or og in description
      var thumb='';
      var mediaTh=item.querySelector('thumbnail')||item.querySelector('[url]');
      if(mediaTh)thumb=mediaTh.getAttribute('url')||mediaTh.getAttribute('href')||'';
      if(!thumb){var enc=item.querySelector('enclosure[type^="image"]');if(enc)thumb=enc.getAttribute('url')||'';}
      if(!thumb){
        // Try to parse img from description/content
        var desc=(item.querySelector('description,summary,content')||{}).textContent||'';
        var imgMatch=desc.match(/<img[^>]+src=["']([^"']+)["']/i);
        if(imgMatch)thumb=imgMatch[1];
      }
      // Extract YouTube video ID if possible
      var videoId='';
      var ytMatch=(link||'').match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
      if(ytMatch){videoId=ytMatch[1];if(!thumb)thumb='https://img.youtube.com/vi/'+videoId+'/mqdefault.jpg';}
      var dStr='';
      if(pubDate){try{var d=new Date(pubDate);if(!isNaN(d))dStr=d.toLocaleDateString('te-IN')||d.toLocaleDateString();}catch{}}
      return{title:title.trim(),link:link.trim(),thumb:thumb,videoId:videoId,date:dStr,source:feedObj.label||'Video'};
    }).filter(function(v){return v.title&&v.link;});
  }catch(e){console.warn('[RSS]',feedObj.url,e.message);return[];}
}

function _buildArticleVideoItems(){
  // Fallback: use existing articles as video cards
  var artList=Object.values(ARTICLES);
  if(!artList.length)return '';
  return artList.slice(0,8).map(function(a){
    return '<div class="vg-card" onclick="goArticle(\''+a.cat+'\',\''+a.id+'\')">'+
      '<div class="vg-img"><img src="'+a.img+'" alt="'+a.imgAlt+'"/>'+
      '<div class="vg-play"><div class="vg-play-btn">▶</div></div></div>'+
      '<div class="vg-body"><div class="vg-cat">'+a.catLabel+'</div>'+
      '<div class="vg-title">'+(a.title||'').substring(0,60)+'</div>'+
      '<div class="vg-meta">'+a.date+'</div></div></div>';
  }).join('');
}

async function loadRssVideos(){
  if(_rssVideoLoading)return;
  _rssVideoLoading=true;
  var feeds=_getRssFeeds();
  var gridEl=document.getElementById('videoGrid');
  if(!gridEl){_rssVideoLoading=false;return;}
  if(!feeds.length){_rssVideoLoading=false;return;}
  gridEl.innerHTML='<div class="vb-loader" style="grid-column:1/-1"><div class="mini-spin"></div>Videos load అవుతున్నాయి…</div>';
  var allItems=[];
  await Promise.all(feeds.map(async function(f){
    var items=await _fetchRssFeed(f);
    allItems=allItems.concat(items);
  }));
  // Dedupe by link, limit to 8
  var seen=new Set();
  allItems=allItems.filter(function(v){if(seen.has(v.link))return false;seen.add(v.link);return true;}).slice(0,8);
  _rssVideoCache=allItems;
  _rssVideoLoading=false;
  // If RSS returned nothing, fall back to article-based cards
  if(!allItems.length){
    var fb=_buildArticleVideoItems();
    gridEl.innerHTML=fb||'';
    return;
  }
  _renderVideoBand(gridEl,allItems);
}

function _renderVideoBand(gridEl,items){
  if(!items||!items.length){
    // Final fallback to article videos
    var fb=_buildArticleVideoItems();
    gridEl.innerHTML=fb||'<div style="color:#555;font-size:12px;padding:14px 0;grid-column:1/-1">Videos అందుబాటులో లేవు.</div>';
    return;
  }
  gridEl.innerHTML=items.slice(0,8).map(function(v){
    var thumb=v.thumb||'https://picsum.photos/seed/'+encodeURIComponent(v.title.substring(0,10))+'/480/270';
    var onclick=v.videoId?
      "window.open('https://www.youtube.com/watch?v="+v.videoId+"','_blank')":
      "window.open('"+v.link.replace(/'/g,"\\'")+"','_blank')";
    return '<div class="vg-card" onclick="'+onclick+'">'+
      '<div class="vg-img"><img src="'+thumb+'" alt="'+v.title.replace(/"/g,'&quot;')+'" onerror="this.src=\'https://picsum.photos/seed/vid/480/270\'"/>'+
      '<div class="vg-play"><div class="vg-play-btn">▶</div></div></div>'+
      '<div class="vg-body"><div class="vg-cat">'+v.source+'</div>'+
      '<div class="vg-title">'+v.title.substring(0,60)+(v.title.length>60?'…':'')+'</div>'+
      '<div class="vg-meta">'+v.date+'</div></div></div>';
  }).join('');
}

function _applyGT(lang){
  var tries=0,iv=setInterval(function(){
    var sel=document.querySelector('.goog-te-combo');
    if(sel){clearInterval(iv);sel.value=lang==='en'?'en':'te';sel.dispatchEvent(new Event('change'));}
    else if(++tries>40)clearInterval(iv);
  },150);
}
function activateTranslate(lang){
  if(lang==='en'){
    _initGT();setTimeout(function(){_applyGT('en');},600);
    document.documentElement.setAttribute('lang','en');
  } else {
    var sel=document.querySelector('.goog-te-combo');
    if(sel){sel.value='te';sel.dispatchEvent(new Event('change'));}
    // GT restore button fallback
    var frame=document.querySelector('.goog-te-banner-frame');
    if(frame){try{var d=frame.contentDocument||frame.contentWindow.document;var b=d.querySelector('[id$=restore]')||d.querySelector('button');if(b)b.click();}catch(e){}}

}

function copyLink(btn){var url=location.href;if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(()=>_showCopied(btn)).catch(()=>_fallbackCopy(url,btn));}else _fallbackCopy(url,btn);}
function _fallbackCopy(text,btn){var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');_showCopied(btn);}catch(e){}document.body.removeChild(ta);}
