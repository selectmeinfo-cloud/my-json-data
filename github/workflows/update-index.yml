name: Update Index

on:
  push:                  # ఏ file push/upload అయినా trigger అవుతుంది
  workflow_dispatch:     # GitHub Actions tab లో manually కూడా run చేయవచ్చు

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Run update-index.js
        run: node update-index.js

      - name: Commit index.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git diff --cached --quiet || git commit -m "chore: auto-update index.json"
          git push
