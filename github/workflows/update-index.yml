name: Update Manifest

on:
  push:
    paths:
      - 'data/**.json'   # data/ లో ఏదైనా .json మారితే trigger అవుతుంది

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate data/manifest.json
        run: |
          python3 - <<'EOF'
          import os, json
          from pathlib import Path

          data_dir = Path("data")
          skip     = {"index.json", "manifest.json"}
          files    = []

          for f in data_dir.glob("*.json"):
              if f.name in skip:
                  continue
              try:
                  d   = json.loads(f.read_text())
                  pub = d.get("published_date", "")
              except Exception:
                  pub = ""
              files.append((pub, f.name))

          files.sort(key=lambda x: x[0], reverse=True)   # latest first
          names = [n for _, n in files]

          out = data_dir / "manifest.json"
          out.write_text(json.dumps({"files": names}, ensure_ascii=False, indent=2))
          print(f"manifest.json updated — {len(names)} files")
          EOF

      - name: Commit manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/manifest.json
          git diff --cached --quiet || git commit -m "chore: auto-update manifest.json"
          git push
