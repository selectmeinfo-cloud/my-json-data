name: Update Index

on:
  push:
  workflow_dispatch:

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Debug — check files
        run: |
          echo "=== Root files ==="
          ls -la
          echo "=== data/ folder ==="
          ls -la data/ || echo "data/ folder లేదు!"
          echo "=== index.json current ==="
          cat index.json || echo "index.json లేదు!"

      - name: Run update-index.js
        run: node update-index.js

      - name: Debug — index.json after update
        run: |
          echo "=== index.json after update ==="
          cat index.json

      - name: Commit index.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git diff --cached --quiet || git commit -m "chore: auto-update index.json"
          git push
