name: Auto Update data/index.json

on:
  push:
    paths:
      - 'data/**.json'

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run update-index.js
        run: node update-index.js

      - name: Commit & Push index.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git diff --staged --quiet && echo "No changes" || \
            (git commit -m "chore: auto-update data/index.json [skip ci]" && git push)